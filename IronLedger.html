<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Iron Ledger</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Iron Ledger" />
<meta name="theme-color" content="#0F7B6F" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #F6F8F8; color: #101619;
    font-family: -apple-system, system-ui, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px 90px; }
  header { padding: 24px 0 12px; border-bottom: 1px solid #E2E8E9; display: flex; align-items: center; gap: 12px; }
  .icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(160deg,#0F7B6F,#0A5A51);
    display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 18px; }
  h1 { font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: .04em; }
  .sub { font-size: 12px; color: #67757B; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #67757B; margin: 24px 0 8px; }
  .card { background: #fff; border: 1px solid #E2E8E9; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  label { display: block; font-size: 13px; color: #67757B; margin: 10px 0 4px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #E2E8E9; border-radius: 8px;
    font-size: 15px; background: #fff; color: #101619; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  .slider-val { float: right; font-family: ui-monospace, monospace; color: #0F7B6F; font-weight: 600; }
  input[type=range] { -webkit-appearance: none; background: transparent; padding: 0; }
  input[type=range]::-webkit-slider-runnable-track { height: 3px; background: #E2E8E9; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 4px;
    background: #0F7B6F; margin-top: -8px; }
  button { width: 100%; padding: 13px; border: none; border-radius: 8px; background: #0F7B6F; color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer; }
  button:active { background: #0C665C; }
  button.ghost { background: #fff; color: #0F7B6F; border: 1px solid #0F7B6F; }
  button.small { width: auto; padding: 8px 14px; font-size: 13px; }
  .stat { display: inline-block; background: #fff; border: 1px solid #E2E8E9; border-radius: 8px;
    padding: 8px 4px; text-align: center; }
  .stat .n { font-family: ui-monospace, monospace; font-size: 17px; font-weight: 600; }
  .stat .l { font-size: 10px; color: #67757B; text-transform: uppercase; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
  .ex { border: 1px solid #E2E8E9; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .ex .nm { font-weight: 600; font-size: 14px; }
  .ex .meta { font-size: 12px; color: #67757B; margin-top: 2px; }
  .ex .note { font-size: 12px; color: #67757B; font-style: italic; margin-top: 4px; }
  .setrow { display: grid; grid-template-columns: 28px 1fr 1fr 1fr; gap: 6px; align-items: center; margin-top: 6px; }
  .setrow span { font-size: 12px; color: #67757B; font-family: ui-monospace, monospace; }
  .setrow input { padding: 7px; font-size: 13px; }
  nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E2E8E9;
    display: flex; }
  nav button { background: none; color: #67757B; border-radius: 0; padding: 12px 4px; font-size: 11px; font-weight: 500; }
  nav button.active { color: #0F7B6F; }
  .flash { position: fixed; bottom: 70px; left: 16px; right: 16px; background: #0F7B6F; color: #fff;
    padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; z-index: 100; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px; text-align: left; border-bottom: 1px solid #E2E8E9; }
  th { color: #67757B; font-weight: 500; font-size: 11px; text-transform: uppercase; background: #F0F4F4; }
  td.n { font-family: ui-monospace, monospace; text-align: right; }
  .warn { background: #fff; border: 1px solid rgba(192,57,43,.4); color: #C0392B; padding: 12px;
    border-radius: 8px; font-size: 13px; margin-top: 10px; }
  .muted { color: #67757B; font-size: 12px; }
  .painblock { border: 1px solid #E2E8E9; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .painblock .t { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  svg { display: block; width: 100%; }
</style>
</head>
<body>
<div class="wrap" id="app">Lädt…</div>
<nav id="nav"></nav>
<div id="flash"></div>

<script>
"use strict";

/* ---------- storage (dual: localStorage + IndexedDB fallback is overkill; localStorage is reliable here) ---------- */
function save(key, val) {
  try { localStorage.setItem("il_" + key, JSON.stringify(val)); return true; }
  catch (e) { alert("Speichern fehlgeschlagen: " + e.message); return false; }
}
function load(key, fallback) {
  try { var v = localStorage.getItem("il_" + key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}

/* ---------- date ---------- */
function today() {
  var d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
}
function round25(x) { return Math.round(x / 2.5) * 2.5; }

/* ---------- state ---------- */
var profile = load("profile", null);
var settings = load("settings", { dayIndex: 0 });
var checkinToday = load("checkin_" + today(), null);
var workoutToday = load("workout_" + today(), null);
var trend = load("trend", { bw: [], e1rm: {}, pain: [], logins: [] });
var tab = "today";

/* ---------- training templates ---------- */
var SESSIONS = [
  { id: "A", label: "Unterkörper – Zug", slots: ["hinge", "squat", "core"] },
  { id: "B", label: "Oberkörper – Push/Pull", slots: ["push", "row", "pull", "neck"] },
  { id: "C", label: "Unterkörper – Druck", slots: ["squat", "hinge", "core"] },
  { id: "D", label: "Oberkörper – Pull-Fokus", slots: ["pull", "row", "pushlight", "neck"] }
];

function pickSquat(kneePain) {
  if (kneePain >= 6) return { pat: "squat", nm: "Spanish Squat (isometrisch)", type: "iso", sets: 5, sec: 45, note: "Isometrie wirkt bei Patellasehnen-Reizung oft schmerzdämpfend. Schmerz beim Halten max. 3/10." };
  if (kneePain >= 3) return { pat: "squat", nm: "Beinpresse (ROM < 90°)", type: "reps", sets: 3, reps: 8, rpe: 7, note: "Tiefe begrenzen, kein Schmerz über 3/10." };
  return { pat: "squat", nm: "Kniebeuge (High-Bar)", type: "reps", sets: 4, reps: 5, rpe: 8 };
}
function pickHinge(kneePain) {
  return { pat: "hinge", nm: "Kreuzheben", type: "reps", sets: 4, reps: 5, rpe: kneePain >= 6 ? 7 : 8, note: "Prioritätslift – hier läuft die Progression." };
}
function pickPush(shPain, light) {
  if (shPain >= 6) return { pat: "push", nm: "Cable Press (neutral, tief)", type: "reps", sets: light ? 2 : 3, reps: 10, rpe: light ? 5 : 6, note: "Ellbogen nah, minimale Schulterdach-Beteiligung." };
  if (shPain >= 3) return { pat: "push", nm: "Floor Press (neutral)", type: "reps", sets: light ? 2 : 3, reps: 8, rpe: light ? 5 : 7 };
  return { pat: "push", nm: light ? "Bankdrücken – leicht" : "Bankdrücken", type: "reps", sets: light ? 2 : 4, reps: light ? 6 : 5, rpe: light ? 5 : 8 };
}
var FIXED = {
  row: { pat: "row", nm: "Rudern / Kabelzug eng", type: "reps", sets: 3, reps: 10, rpe: 7 },
  pull: { pat: "pull", nm: "Latzug (neutral)", type: "reps", sets: 3, reps: 10, rpe: 7 },
  neck: { pat: "neck", nm: "Nacken-Isometrie (4-Wege)", type: "iso", sets: 3, sec: 25, note: "Isometrie hilft gegen Steifheit." },
  core: { pat: "core", nm: "Pallof Press", type: "reps", sets: 3, reps: 12, rpe: 6 }
};

/* ---------- periodization (mesocycle, autoregulated) ---------- */
var MESO_WEEKS = [
  { phase: "Akkumulation 1", rpeCap: 7, volMult: 1.0 },
  { phase: "Akkumulation 2", rpeCap: 8, volMult: 1.1 },
  { phase: "Intensivierung 1", rpeCap: 8.5, volMult: 1.0 },
  { phase: "Intensivierung 2", rpeCap: 9, volMult: 0.9 },
  { phase: "Deload", rpeCap: 6, volMult: 0.55 }
];
function meso() {
  var done = (trend && trend.sessions ? trend.sessions.length : 0);
  var weekAbs = Math.floor(done / 4);
  var wk = ((weekAbs % MESO_WEEKS.length) + MESO_WEEKS.length) % MESO_WEEKS.length;
  var block = Math.floor(weekAbs / MESO_WEEKS.length) + 1;
  var m = MESO_WEEKS[wk] || MESO_WEEKS[0];
  return { phase: m.phase, rpeCap: m.rpeCap, volMult: m.volMult, week: wk + 1, block: block };
}

/* ---------- strength standards (kg) for percentile bands, ~82kg male bodyweight ---------- */
/* Rough population 1RM standards; used only for a self-orientation percentile. */
var STANDARDS = {
  squat:  { beginner: 60, novice: 90, intermediate: 125, advanced: 165, elite: 205 },
  hinge:  { beginner: 80, novice: 115, intermediate: 155, advanced: 200, elite: 245 },
  push:   { beginner: 45, novice: 65, intermediate: 90, advanced: 120, elite: 150 }
};
var LEVEL_NAMES = ["Anfänger", "Fortgeschritten", "Mittel", "Gut", "Elite"];
function percentileFor(pat, e1rm) {
  if (e1rm == null) return null;
  var s = STANDARDS[pat];
  // map the 5 standards to approx population percentiles
  var pts = [[s.beginner, 5], [s.novice, 20], [s.intermediate, 50], [s.advanced, 80], [s.elite, 95]];
  if (e1rm <= pts[0][0]) return Math.max(1, Math.round(e1rm / pts[0][0] * 5));
  if (e1rm >= pts[4][0]) return 99;
  for (var i = 0; i < pts.length - 1; i++) {
    if (e1rm >= pts[i][0] && e1rm <= pts[i + 1][0]) {
      var t = (e1rm - pts[i][0]) / (pts[i + 1][0] - pts[i][0]);
      return Math.round(pts[i][1] + t * (pts[i + 1][1] - pts[i][1]));
    }
  }
  return 50;
}
function levelFor(pat, e1rm) {
  if (e1rm == null) return "–";
  var s = STANDARDS[pat];
  if (e1rm < s.novice) return "Anfänger";
  if (e1rm < s.intermediate) return "Fortgeschritten";
  if (e1rm < s.advanced) return "Mittel";
  if (e1rm < s.elite) return "Gut";
  return "Elite";
}

/* ---------- monthly gain rate per lift (kg/month) ---------- */
function gainRate(pat) {
  var arr = (trend.e1rm && trend.e1rm[pat]) || [];
  if (arr.length < 2) return null;
  var first = arr[0], last = arr[arr.length - 1];
  var days = (new Date(last.date) - new Date(first.date)) / 86400000;
  if (days < 1) return null;
  return { week: (last.v - first.v) / days * 7, month: (last.v - first.v) / days * 30, total: last.v - first.v, days: Math.round(days) };
}

/* ---------- estimated lean mass gain ---------- */
function leanGain() {
  var sessions = (trend.sessions || []).length;
  var consistency = Math.min(1, sessions / 12);
  var monthly = 0.7 * consistency;
  var bwTrend = null;
  if (trend.bw && trend.bw.length >= 4) {
    var s = trend.bw.slice(), n = s.length;
    var half = Math.floor(n / 2);
    var avgOld = s.slice(0, half).reduce(function (a, b) { return a + b.v; }, 0) / half;
    var avgNew = s.slice(half).reduce(function (a, b) { return a + b.v; }, 0) / (n - half);
    var spanDays = (new Date(s[n - 1].date) - new Date(s[0].date)) / 86400000;
    if (spanDays >= 6) bwTrend = (avgNew - avgOld) / (spanDays / 2) * 7;
  }
  if (bwTrend != null) {
    if (bwTrend <= 0) monthly *= 0.35;
    else if (bwTrend < 0.1) monthly *= 0.7;
    else if (bwTrend > 0.5) monthly *= 0.85;
  }
  var days = sessions * 7 / 4;
  return { monthly: monthly, cumulative: monthly / 30 * days };
}

/* ---------- RTS-style autoregulation: learn individual fatigue response ---------- */
function fatigueSignal() {
  // Look at recent session RPEs and e1RM direction to gauge accumulated fatigue.
  var sess = (trend.sessions || []).slice(-3);
  var reasons = [];
  var score = 0; // higher = more fatigued
  if (sess.length === 3) {
    var avgRpe = sess.reduce(function (a, s) { return a + (s.rpe || 7); }, 0) / 3;
    if (avgRpe >= 8.5) { score += 2; reasons.push("Ø Session-RPE " + avgRpe.toFixed(1) + " (hoch)"); }
    else if (avgRpe >= 7.5) { score += 1; }
  }
  // e1rm falling across last 3 in any big lift?
  ["squat", "hinge", "push"].forEach(function (p) {
    var a = (trend.e1rm && trend.e1rm[p]) || [];
    if (a.length >= 3) {
      var l3 = a.slice(-3).map(function (x) { return x.v; });
      if (l3[2] < l3[1] && l3[1] < l3[0]) { score += 2; reasons.push(p + " e1RM fällt 3× in Folge"); }
    }
  });
  return { score: score, reasons: reasons, deloadSuggested: score >= 4 };
}

/* ---------- honest gain-rate reference (clearly marked as orientation, not exact science) ---------- */
/* These are rough experience-based orientation ranges for MONTHLY e1RM gain (kg),
   NOT precise scientific genetic categories. They also assume you're not yet at a plateau. */
function gainReferenceBands(pat) {
  // scale roughly by lift size (deadlift gains bigger absolute numbers than bench)
  var scale = { squat: 1.0, hinge: 1.2, push: 0.6 }[pat] || 1.0;
  return [
    { label: "Langsame Reaktion", perMonth: 1.5 * scale, color: "#C0392B" },
    { label: "Durchschnitt", perMonth: 3.0 * scale, color: "#67757B" },
    { label: "Gute Reaktion", perMonth: 5.0 * scale, color: "#0F7B6F" },
    { label: "Sehr schnell (früh/Wiedereinstieg)", perMonth: 8.0 * scale, color: "#0A5A51" }
  ];
}

/* ---------- cumulative progression archetype curves (model, clearly labelled) ---------- */
/* Models CUMULATIVE e1RM gain over weeks for 4 lifter types. The SHAPE is realistic
   (beginners spike early then plateau; elite keeps climbing) — the exact kg are a model,
   not measured data. Your own real curve is overlaid for comparison. */
function archetypeCurve(type, weeks, scale) {
  // Each type: total plateau ceiling (kg over ~52 weeks) and how fast it saturates.
  var params = {
    slow:    { ceiling: 18, k: 0.16 },   // plateaus early & low
    average: { ceiling: 32, k: 0.10 },
    good:    { ceiling: 48, k: 0.065 },
    elite:   { ceiling: 70, k: 0.04 }     // keeps climbing, saturates very late
  }[type];
  var out = [];
  for (var w = 0; w <= weeks; w++) {
    // saturating exponential: cumulative = ceiling * (1 - e^(-k*w))
    out.push(params.ceiling * (1 - Math.exp(-params.k * w)) * scale);
  }
  return out;
}
var ARCHETYPES = [
  { type: "slow", label: "Schwach", color: "#C0392B" },
  { type: "average", label: "Mittel", color: "#B27A00" },
  { type: "good", label: "Gut", color: "#0F7B6F" },
  { type: "elite", label: "Elite", color: "#0A5A51" }
];
// Build your real cumulative curve per week from e1rm history (relative to first entry)
function yourCumulative(pat, weeks) {
  var arr = (trend.e1rm && trend.e1rm[pat]) || [];
  if (arr.length < 1) return [];
  var start = new Date(arr[0].date), base = arr[0].v;
  var out = [];
  for (var w = 0; w <= weeks; w++) {
    var target = new Date(start.getTime() + w * 7 * 86400000);
    // latest entry at or before this week
    var val = null;
    for (var i = 0; i < arr.length; i++) { if (new Date(arr[i].date) <= target) val = arr[i].v; }
    out.push(val != null ? (val - base) : null);
  }
  return out;
}

/* ---------- volume tracking (RP / Israetel style) ---------- */
/* Direct muscle worked by each movement pattern (1 set = 1 direct set). */
var DIRECT_MUSCLE = {
  squat: "quads", hinge: "hamstrings", push: "chest",
  row: "back", pull: "back", core: "abs",
  reh_sh: "shoulders", reh_kn: "quads", reh_nk: "neck"
};
/* Fractional contribution: e.g. bench press also hits triceps/front delts as ~0.5/0.33 sets. */
var FRACTIONAL = {
  squat: { quads: 1, glutes: 0.5, hamstrings: 0.33 },
  hinge: { hamstrings: 1, back: 0.5, glutes: 0.66 },
  push: { chest: 1, triceps: 0.5, shoulders: 0.33 },
  row: { back: 1, biceps: 0.5, rearDelts: 0.33 },
  pull: { back: 1, biceps: 0.5 },
  core: { abs: 1 },
  reh_sh: { shoulders: 1 }, reh_kn: { quads: 0.5 }, reh_nk: { neck: 1 }
};
var MUSCLE_DE = { quads: "Quadrizeps", hamstrings: "Beinbeuger", glutes: "Gesäß", chest: "Brust", back: "Rücken", triceps: "Trizeps", biceps: "Bizeps", shoulders: "Schultern", rearDelts: "hint. Schulter", abs: "Rumpf", neck: "Nacken" };
var LANDMARKS = {
  quads: { mev: 6, mav: 12, mrv: 18 }, hamstrings: { mev: 4, mav: 10, mrv: 16 },
  glutes: { mev: 4, mav: 9, mrv: 16 }, chest: { mev: 6, mav: 12, mrv: 20 },
  back: { mev: 8, mav: 14, mrv: 22 }, triceps: { mev: 4, mav: 10, mrv: 16 },
  biceps: { mev: 4, mav: 10, mrv: 16 }, shoulders: { mev: 6, mav: 12, mrv: 20 },
  rearDelts: { mev: 4, mav: 10, mrv: 16 }, abs: { mev: 6, mav: 12, mrv: 20 }, neck: { mev: 2, mav: 6, mrv: 12 }
};
/* Weekly volume from logged sessions in the last 7 days. mode: 'direct' or 'fractional'. */
function weeklyVolume(mode) {
  var cutoff = Date.now() - 7 * 86400000;
  var totals = {};
  var logs = trend.volumeLog || [];
  logs.forEach(function (entry) {
    if (new Date(entry.date).getTime() < cutoff) return;
    var pat = entry.pat, sets = entry.sets;
    if (mode === "fractional") {
      var frac = FRACTIONAL[pat];
      if (frac) Object.keys(frac).forEach(function (mus) { totals[mus] = (totals[mus] || 0) + sets * frac[mus]; });
    } else {
      var mus2 = DIRECT_MUSCLE[pat];
      if (mus2) totals[mus2] = (totals[mus2] || 0) + sets;
    }
  });
  return totals;
}
function volStatus(sets, lm) {
  if (sets < lm.mev) return { label: "unter MEV", color: "#C0392B" };
  if (sets <= lm.mav) return { label: "Aufbau", color: "#0F7B6F" };
  if (sets <= lm.mrv) return { label: "hoch", color: "#B27A00" };
  return { label: "über MRV", color: "#C0392B" };
}

/* ---------- evidence-based evaluation engine (meso/macro) ---------- */
/* Combines your logged quantitative data with a short qualitative survey and
   produces concrete, individually justified adjustment SUGGESTIONS (not auto-applied).
   Principles: RP volume landmarks, RPE/RIR autoregulation, per-lift frequency-recovery. */

// Per-lift frequency recovery notes (evidence: larger/heavier lifts need more recovery).
var LIFT_FREQ = {
  hinge: { name: "Kreuzheben", maxFreq: 2, note: "Kreuzheben ist axial sehr ermüdend – selten mehr als 2×/Woche sinnvoll." },
  squat: { name: "Kniebeuge", maxFreq: 3, note: "Kniebeuge verträgt 2–3×/Woche, wenn Volumen pro Einheit moderat bleibt." },
  push:  { name: "Bankdrücken", maxFreq: 4, note: "Bankdrücken erlaubt oft höhere Frequenz (2–4×), da weniger systemisch ermüdend." }
};

function evaluateBlock(survey) {
  // survey: { recovery:1-5, jointHealth:1-5, motivation:1-5, sleepAvg:1-5, timeBudget:1-5, sorenessLingers:bool }
  var recs = [];
  var s = survey || {};

  // --- 1. VOLUME (intense sets/week vs MEV/MAV/MRV) ---
  var vol = weeklyVolume("direct");
  ["chest", "back", "quads", "hamstrings"].forEach(function (mus) {
    var sets = vol[mus] || 0, lm = LANDMARKS[mus];
    if (!lm) return;
    var deName = MUSCLE_DE[mus] || mus;
    if (sets < lm.mev) {
      recs.push({ cat: "Volumen", dir: "erhöhen", detail: deName + ": " + Math.round(sets) + " Sätze/Wo liegt unter MEV (" + lm.mev + "). Vorschlag: +" + Math.max(2, lm.mev - Math.round(sets)) + " Sätze/Woche, um überhaupt Wachstumsreiz zu setzen.", why: "Unter dem minimalen effektiven Volumen findet kaum Adaptation statt (Israetel/RP-Modell)." });
    } else if (sets > lm.mrv) {
      recs.push({ cat: "Volumen", dir: "senken", detail: deName + ": " + Math.round(sets) + " Sätze/Wo über MRV (" + lm.mrv + "). Vorschlag: −" + Math.max(2, Math.round(sets) - lm.mav) + " Sätze/Woche.", why: "Über dem maximal erholbaren Volumen sammelt sich mehr Ermüdung als Reiz." });
    } else if (sets >= lm.mav && (s.recovery == null || s.recovery >= 3)) {
      recs.push({ cat: "Volumen", dir: "halten", detail: deName + ": " + Math.round(sets) + " Sätze/Wo im produktiven Bereich (MAV " + lm.mav + "). Halten oder max. +1–2 Sätze, wenn Erholung gut bleibt.", why: "Nahe MAV ist der Reiz-Ermüdungs-Kompromiss meist optimal." });
    }
  });

  // --- 2. FREQUENCY (per lift, strength focus) ---
  var recentSess = (trend.sessions || []).slice(-8);
  var freqCount = {};
  recentSess.forEach(function (ss) { freqCount[ss.dayId] = (freqCount[ss.dayId] || 0) + 1; });
  Object.keys(LIFT_FREQ).forEach(function (pat) {
    var g = gainRate(pat);
    var lf = LIFT_FREQ[pat];
    if (g && g.week <= 0.05 && (s.recovery == null || s.recovery >= 3)) {
      recs.push({ cat: "Frequenz", dir: "erhöhen (prüfen)", detail: lf.name + " stagniert (≈ " + g.week.toFixed(1) + " kg/Wo). Wenn Erholung gut: 1× zusätzliche, leichtere Frequenz erwägen (bis " + lf.maxFreq + "×/Wo).", why: lf.note + " Mehr Frequenz kann bei guter Erholung Kraft steigern (verteiltes Volumen)." });
    }
  });

  // --- 3. INTENSITY / PROGRESSION MODEL (RIR/RPE/%1RM) ---
  var m = meso();
  var sessRpe = recentSess.length ? recentSess.reduce(function (a, x) { return a + (x.rpe || 7); }, 0) / recentSess.length : null;
  if (sessRpe != null) {
    if (sessRpe >= 8.5 && (s.recovery != null && s.recovery <= 2)) {
      recs.push({ cat: "Intensität", dir: "senken", detail: "Ø Session-RPE " + sessRpe.toFixed(1) + " bei schlechter Erholung. Vorschlag: nächsten Block RPE-Cap −0,5 bis −1 (mehr RIR), z.B. Arbeitssätze bei RIR 2–3 statt 0–1.", why: "Chronisch hohe Intensität ohne Erholung erhöht Verletzungs-/Übertrainingsrisiko, gerade bei gereizten Sehnen." });
    } else if (sessRpe < 7 && (s.recovery == null || s.recovery >= 4)) {
      recs.push({ cat: "Intensität", dir: "erhöhen", detail: "Ø Session-RPE " + sessRpe.toFixed(1) + " ist niedrig bei guter Erholung. Vorschlag: RPE-Cap +0,5 (näher an RIR 1–2), um mehr Kraftreiz zu setzen.", why: "Zu niedrige Intensität lässt Kraftpotenzial liegen, wenn Erholung es zulässt." });
    }
  }
  recs.push({ cat: "Progressionsmodell", dir: "phasenabhängig", detail: "Aktuell " + m.phase + ": " + (m.phase.indexOf("Akkumulation") >= 0 ? "RIR 2–3 / RPE ≤ " + m.rpeCap + ", Fokus Volumen." : m.phase.indexOf("Intensivierung") >= 0 ? "RIR 1–2 / RPE bis " + m.rpeCap + ", Fokus Last." : "Deload: RPE ≤ 6, Volumen −40–50%."), why: "Wellenförmige Periodisierung (Volumen → Intensität → Deload) ist gut belegt für Kraft/Hypertrophie." });

  // --- 4. EXERCISE SELECTION (pain-driven for you) ---
  var lastPain = (trend.pain || []).slice(-3);
  if (lastPain.length) {
    var avgSh = lastPain.reduce(function (a, p) { return a + p.sh; }, 0) / lastPain.length;
    var avgKn = lastPain.reduce(function (a, p) { return a + p.kn; }, 0) / lastPain.length;
    if (avgSh >= 4) recs.push({ cat: "Übungsauswahl", dir: "anpassen", detail: "Schulter-Belastungsschmerz Ø " + avgSh.toFixed(1) + "/10. Vorschlag: Druckübungen weiter in schmerzfreiem ROM/neutralem Griff halten, erst bei <3/10 über 2 Wochen Richtung Wettkampf-Bankdrücken progressieren.", why: "Schmerzgesteuerte Progression schützt die Supraspinatus-Sehne vor Reizung." });
    if (avgKn >= 4) recs.push({ cat: "Übungsauswahl", dir: "anpassen", detail: "Knie-Belastungsschmerz Ø " + avgKn.toFixed(1) + "/10. Vorschlag: isometrische/HSR-Varianten priorisieren, Beugung schmerzarm dosieren.", why: "Heavy-Slow-Resistance & Isometrie sind bei Patellatendinopathie evidenzbasiert wirksam." });
  }
  if (s.sorenessLingers) recs.push({ cat: "Erholung", dir: "beachten", detail: "Muskelkater hält >2 Tage an → aktuelles Volumen/Intensität ist nah an der Erholungsgrenze. Eher halten als steigern.", why: "Anhaltender DOMS deutet auf unvollständige Erholung zwischen Einheiten hin." });

  if (s.jointHealth != null && s.jointHealth <= 2) recs.push({ cat: "Priorität", dir: "wichtig", detail: "Du bewertest deine Gelenkgesundheit als schlecht. Reha/Schmerzfreiheit vor Progression – im Zweifel Last raus und physiotherapeutisch abklären.", why: "Dein primäres Ziel ist Schmerzfreiheit; strukturelle Reizung geht Kraftaufbau vor." });

  return recs;
}

function e1rmFor(pat) {
  var arr = (trend.e1rm && trend.e1rm[pat]) || [];
  return arr.length ? arr[arr.length - 1].v : null;
}
function recWeight(ex) {
  if (ex.type !== "reps") return null;
  var e = e1rmFor(ex.pat);
  if (!e) return null;
  var rir = 10 - ex.rpe;
  return round25(e / (1 + (ex.reps + rir) * 0.0333));
}

function buildWorkout(c, forceDayIndex) {
  var di = (forceDayIndex != null) ? forceDayIndex : settings.dayIndex;
  var tmpl = SESSIONS[di % SESSIONS.length];
  var kp = c ? c.kneeLoad : 0, sp = c ? c.shLoad : 0;
  var m = meso();
  var r = readiness(c);
  var fatigue = fatigueSignal();
  // RTS autoregulation: if your own performance/RPE data shows accumulated fatigue,
  // trigger an unplanned deload regardless of the calendar week.
  var autoDeload = fatigue.deloadSuggested;
  var exs = tmpl.slots.map(function (slot) {
    var ex;
    if (slot === "squat") ex = pickSquat(kp);
    else if (slot === "hinge") ex = pickHinge(kp);
    else if (slot === "push") ex = pickPush(sp, false);
    else if (slot === "pushlight") ex = pickPush(sp, true);
    else ex = Object.assign({}, FIXED[slot]);
    // periodization: volume + rpe cap
    if (ex.type === "reps") {
      ex.sets = Math.max(1, Math.round(ex.sets * m.volMult));
      if (ex.rpe > m.rpeCap) ex.rpe = m.rpeCap;
      // RTS auto-deload takes priority
      if (autoDeload) { ex.sets = Math.max(2, Math.round(ex.sets * 0.6)); ex.rpe = Math.min(ex.rpe, 6); ex.autoDeload = true; }
      // readiness damping
      else if (r != null && r < 45) { ex.sets = Math.max(2, ex.sets - 1); ex.rpe = Math.max(5, ex.rpe - 2); ex.damped = true; }
      else if (r != null && r < 60) { ex.rpe = Math.max(5, ex.rpe - 1); ex.damped = true; }
    }
    ex.rec = recWeight(ex);
    return ex;
  });
  // rehab additions
  var rehab = [];
  if (c) {
    var shMax = Math.max(c.shRest, c.shLoad), knMax = Math.max(c.knRest, c.kneeLoad), nkMax = Math.max(c.nkRest, c.nkLoad);
    if (shMax >= 3) rehab.push({ pat: "reh_sh", nm: "Reha: Außenrotation Band", type: "reps", sets: 3, reps: 15, rpe: 5, rehab: true });
    if (knMax >= 3) rehab.push({ pat: "reh_kn", nm: "Reha: Slant-Board Wall Sit", type: "iso", sets: 3, sec: 30, rehab: true });
    if (nkMax >= 3) rehab.push({ pat: "reh_nk", nm: "Reha: Chin Tucks", type: "iso", sets: 3, sec: 15, rehab: true });
  }
  return { date: today(), dayIndex: di, dayId: tmpl.id, label: tmpl.label, meso: meso(), readiness: readiness(c), fatigue: fatigueSignal(), exercises: exs.concat(rehab) };
}

/* ---------- nutrition ---------- */
/* ---------- adaptive calorie correction (autoregulated nutrition) ---------- */
/* Compares your REAL weekly weight change to your TARGET and nudges calories so
   your planned rate of gain actually happens. Uses a smoothed, damped adjustment. */
function weightRatePerWeek() {
  var bw = (trend.bw || []).filter(function (e) { return e.v > 0; });
  if (bw.length < 4) return null;
  var recent = bw.slice(-14);
  if (recent.length < 4) return null;
  var half = Math.floor(recent.length / 2);
  var avg = function (a) { return a.reduce(function (s, e) { return s + e.v; }, 0) / a.length; };
  var older = recent.slice(0, half), newer = recent.slice(half);
  var spanDays = (new Date(recent[recent.length - 1].date) - new Date(recent[0].date)) / 86400000;
  if (spanDays < 6) return null;
  return (avg(newer) - avg(older)) / (spanDays / 2) * 7; // kg/week
}
function adaptiveCorrection() {
  var prev = (trend.calCorrection != null) ? trend.calCorrection : 0;
  var actual = weightRatePerWeek();
  if (actual == null) return { correction: prev, actual: null, target: null, applied: false };
  var rate = { conservative: 0.12, moderate: 0.22, aggressive: 0.4 }[profile.rate || "moderate"];
  var target = rate / 100 * profile.weightKg; // target kg/week
  var diff = target - actual; // positive => gaining too slow => need more kcal
  // 1 kg ≈ 7700 kcal; weekly deficit/surplus needed = diff*7700, per day /7
  var needed = diff * 7700 / 7;
  // damp: move 50% toward the needed correction, clamp to ±400 kcal
  var corr = Math.max(-400, Math.min(400, Math.round((prev + needed) * 0.5)));
  return { correction: corr, actual: actual, target: target, applied: true };
}

function nutrition() {
  if (!profile) return null;
  var lean = profile.weightKg * (1 - profile.bf / 100);
  var bmr = 370 + 21.6 * lean;
  var tdee = bmr * profile.act;
  var rate = { conservative: 0.12, moderate: 0.22, aggressive: 0.4 }[profile.rate || "moderate"];
  var surplus = Math.round((rate / 100 * profile.weightKg * 7700) / 7);
  var corr = (trend.calCorrection != null) ? trend.calCorrection : 0;
  var cal = profile.manualCal || Math.round(tdee + surplus + corr);
  var p = Math.round(profile.weightKg * 2.2), f = Math.round(profile.weightKg * 0.9);
  var c = Math.max(0, Math.round((cal - p * 4 - f * 9) / 4));
  return { tdee: Math.round(tdee), cal: cal, p: p, f: f, c: c, corr: corr };
}

/* ---------- readiness ---------- */
function readiness(c) {
  if (!c) return null;
  var s = Math.min(1, c.sleep / 8) * 100 * 0.3;
  s += ((5 - c.stress) / 4) * 100 * 0.2;
  var pain = (c.shLoad + c.kneeLoad + c.nkLoad) / 3;
  s += ((10 - pain) / 10) * 100 * 0.5;
  return Math.round(Math.max(0, Math.min(100, s)));
}

/* ---------- streak ---------- */
function streak() {
  var set = {}; (trend.logins || []).forEach(function (d) { set[d] = 1; });
  var cur = 0, d = new Date(today());
  while (set[new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10)]) {
    cur++; d.setDate(d.getDate() - 1);
  }
  return cur;
}

/* ---------- simple SVG line chart ---------- */
function lineChart(values, labels, color) {
  color = color || "#0F7B6F";
  var W = 320, H = 150, pad = 30;
  if (!values.length) return '<div class="muted">Noch keine Daten.</div>';
  var mn = Math.min.apply(null, values), mx = Math.max.apply(null, values);
  if (mn === mx) { mn -= 1; mx += 1; }
  var n = values.length;
  var px = function (i) { return pad + (n <= 1 ? 0 : i * (W - pad - 10) / (n - 1)); };
  var py = function (v) { return 10 + (H - 30 - 10) - ((v - mn) / (mx - mn)) * (H - 30 - 10); };
  var pts = values.map(function (v, i) { return px(i) + "," + py(v); }).join(" ");
  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '">';
  for (var g = 0; g <= 3; g++) {
    var yy = 10 + g * (H - 30 - 10) / 3;
    var val = mx - g * (mx - mn) / 3;
    svg += '<line x1="' + pad + '" y1="' + yy + '" x2="' + (W - 10) + '" y2="' + yy + '" stroke="#E2E8E9"/>';
    svg += '<text x="' + (pad - 4) + '" y="' + (yy + 3) + '" font-size="9" fill="#67757B" text-anchor="end">' + (Math.round(val * 10) / 10) + '</text>';
  }
  svg += '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="2"/>';
  values.forEach(function (v, i) { svg += '<circle cx="' + px(i) + '" cy="' + py(v) + '" r="2.5" fill="' + color + '"/>'; });
  svg += '</svg>';
  return svg;
}

/* ---------- LOG ---------- */
function renderLog() {
  if (!workoutToday) { var a = document.getElementById("app"); a.innerHTML = headerHtml() + '<div class="card muted">Mach zuerst das Check-in im Tab „Heute".</div>'; navHtml(); return; }
  var app = document.getElementById("app");
  var html = headerHtml() + '<h2>Eintragen – ' + workoutToday.label + '</h2>';
  workoutToday.exercises.forEach(function (ex, ei) {
    html += '<div class="ex"><div class="nm">' + (ex.rehab ? '🩹 ' : '') + ex.nm + '</div>';
    var saved = ex.logged || [];
    for (var i = 0; i < ex.sets; i++) {
      var s = saved[i] || {};
      if (ex.type === "reps") {
        html += '<div class="setrow"><span>S' + (i + 1) + '</span>' +
          '<input type="number" placeholder="kg" value="' + (s.w != null ? s.w : (ex.rec || "")) + '" id="l_' + ei + '_' + i + '_w"/>' +
          '<input type="number" placeholder="Wdh" value="' + (s.r != null ? s.r : ex.reps) + '" id="l_' + ei + '_' + i + '_r"/>' +
          '<input type="number" placeholder="RPE" value="' + (s.rpe != null ? s.rpe : ex.rpe) + '" id="l_' + ei + '_' + i + '_rpe"/></div>';
      } else {
        html += '<div class="setrow"><span>S' + (i + 1) + '</span>' +
          '<input type="number" placeholder="Sek" value="' + (s.sec != null ? s.sec : ex.sec) + '" id="l_' + ei + '_' + i + '_sec"/>' +
          '<input type="number" placeholder="Schmerz" value="' + (s.pain != null ? s.pain : "") + '" id="l_' + ei + '_' + i + '_pain"/><span></span></div>';
      }
    }
    html += '</div>';
  });
  html += '<label>Gesamt-RPE der Einheit</label>' + '<input type="number" id="l_sessionrpe" placeholder="1-10" value="' + (workoutToday.sessionRpe || 7) + '"/>' +
    '<div style="height:10px"></div>' +
    (workoutToday.done ? '<div class="muted">✓ Einheit gespeichert.</div>' : '<button onclick="finishWorkout()">Einheit abschließen & speichern</button>');

window.finishWorkout = function () {
  workoutToday.exercises.forEach(function (ex, ei) {
    var sets = [];
    for (var i = 0; i < ex.sets; i++) {
      if (ex.type === "reps") {
        var w = parseFloat(v("l_" + ei + "_" + i + "_w")), r = parseInt(v("l_" + ei + "_" + i + "_r"), 10), rp = parseFloat(v("l_" + ei + "_" + i + "_rpe"));
        sets.push({ w: w, r: r, rpe: rp });
      } else {
        sets.push({ sec: parseInt(v("l_" + ei + "_" + i + "_sec"), 10), pain: parseFloat(v("l_" + ei + "_" + i + "_pain")) });
      }
    }
    ex.logged = sets;
    // record volume (number of sets done) for the RP-style table
    if (sets.length && !ex.__volCounted) {
      trend.volumeLog = trend.volumeLog || [];
      trend.volumeLog.push({ date: today(), pat: ex.pat, sets: sets.length });
    }
    // update e1rm for reps
    if (ex.type === "reps" && !ex.rehab) {
      var best = null;
      sets.forEach(function (s) {
        if (s.w > 0 && s.r > 0) {
          var e = s.w * (1 + (s.r + (10 - (s.rpe || 8))) * 0.0333);
          if (!best || e > best) best = e;
        }
      });
      if (best) {
        trend.e1rm = trend.e1rm || {};
        trend.e1rm[ex.pat] = trend.e1rm[ex.pat] || [];
        trend.e1rm[ex.pat].push({ date: today(), v: round25(best) });
      }
    }
  });
  workoutToday.sessionRpe = parseFloat(v("l_sessionrpe")) || 7;
  workoutToday.done = true;
  save("workout_" + today(), workoutToday);
  // record session for mesocycle + checklist
  trend.sessions = trend.sessions || [];
  trend.sessions.push({ date: today(), rpe: workoutToday.sessionRpe, dayId: workoutToday.dayId });
  save("trend", trend);
  // mark checklist trained
  var cl = load("checklist_" + today(), {});
  cl.trained = true; save("checklist_" + today(), cl);
  // advance to next day AND immediately build the next session so it shows right away
  settings.dayIndex = (settings.dayIndex + 1) % SESSIONS.length;
  save("settings", settings);
  workoutToday = buildWorkout(checkinToday);
  workoutToday.done = false;
  save("workout_" + today(), workoutToday);
  flash("Einheit gespeichert – nächste Einheit ist bereit");
  tab = "today";
  render();
};

function volumeTableHtml(mode) {
  var vol = weeklyVolume(mode);
  var muscles = Object.keys(LANDMARKS);
  var rows = "";
  muscles.forEach(function (mus) {
    var sets = vol[mus] || 0;
    if (mode === "direct" && sets === 0 && !DIRECT_HAS(mus)) return;
    var lm = LANDMARKS[mus];
    var st = volStatus(sets, lm);
    rows += '<tr><td>' + (MUSCLE_DE[mus] || mus) + '</td>' +
      '<td class="n">' + (Math.round(sets * 10) / 10) + '</td>' +
      '<td class="n" style="color:' + st.color + '">' + st.label + '</td>' +
      '<td class="n muted" style="font-size:11px">' + lm.mev + '/' + lm.mav + '/' + lm.mrv + '</td></tr>';
  });
  if (!rows) rows = '<tr><td colspan="4" class="muted">Noch keine Einheit geloggt.</td></tr>';
  return '<div class="card"><table><tr><th>Muskel</th><th>Sätze</th><th>Status</th><th>MEV/MAV/MRV</th></tr>' + rows + '</table></div>';
}
function DIRECT_HAS(mus) {
  return Object.keys(DIRECT_MUSCLE).some(function (k) { return DIRECT_MUSCLE[k] === mus; });
}

/* ---------- review scheduling (micro/meso/macro) ---------- */
function reviewStatus() {
  var done = (trend.sessions || []).length;
  var lastMeso = trend.lastMesoReview || 0;   // session count at last meso review
  var lastMacro = trend.lastMacroReview || 0;
  return {
    sessions: done,
    mesoDue: done >= 4 && (done - lastMeso) >= 4,   // every ~4 sessions (≈ end of a training week / deload)
    macroDue: done >= 16 && (done - lastMacro) >= 16, // every ~16 sessions (≈ block/quarter)
    sinceMeso: done - lastMeso,
    sinceMacro: done - lastMacro
  };
}

window.submitReview = function (kind) {
  var gi = function (id) { return parseInt(v(id), 10); };
  var survey = {
    recovery: gi("q_recovery"), jointHealth: gi("q_joint"), motivation: gi("q_motivation"),
    sleepAvg: gi("q_sleep"), timeBudget: gi("q_time"),
    sorenessLingers: document.getElementById("q_soreness") ? document.getElementById("q_soreness").checked : false,
    goalProgress: v("q_goal") || null
  };
  var recs = evaluateBlock(survey);
  var done = (trend.sessions || []).length;
  if (kind === "macro") trend.lastMacroReview = done;
  trend.lastMesoReview = done; // any review resets the meso timer too
  trend.lastRecs = { date: today(), kind: kind, recs: recs, survey: survey };
  save("trend", trend);
  flash("Auswertung erstellt");
  tab = "stats";
  render();
};
function recommendationsHtml() {
  var lr = trend.lastRecs;

  var byCat = {};

  return html;
}

window.saveProfile = function () {
  profile.weightKg = parseFloat(v("p_w")) || profile.weightKg;
  profile.bf = parseFloat(v("p_bf")) || profile.bf;
  profile.rate = v("p_rate");
  var mc = parseFloat(v("p_cal")); profile.manualCal = mc > 0 ? mc : null;
  save("profile", profile);
  flash("Profil gespeichert");
  render();
};
window.exportData = function () {
  var all = {};
  for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k.indexOf("il_") === 0) all[k] = localStorage.getItem(k); }
  var blob = new Blob([JSON.stringify({ app: "IronLedger", date: today(), data: all }, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href = url; a.download = "ironledger-backup-" + today() + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  flash("Backup exportiert");
};
window.importData = function (ev) {
  var file = ev.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function () {
    try {
      var obj = JSON.parse(reader.result);
      if (!obj.data) throw new Error("Ungültige Datei");
      Object.keys(obj.data).forEach(function (k) { localStorage.setItem(k, obj.data[k]); });
      alert("Backup geladen. App wird neu geladen.");
      location.reload();
    } catch (e) { alert("Fehler: " + e.message); }
  };
  reader.readAsText(file);
};

/* ---------- NAV + ROUTER ---------- */
function navHtml() {
  var tabs = [["today", "Heute"], ["log", "Eintragen"], ["progress", "Verlauf"], ["stats", "Statistik"], ["profile", "Profil"]];
  document.getElementById("nav").innerHTML = tabs.map(function (t) {
    return '<button class="' + (tab === t[0] ? "active" : "") + '" onclick="go(\'' + t[0] + '\')">' + t[1] + '</button>';
  }).join("");
}
window.go = function (t) { tab = t; render(); };
function render() {
  // refresh state from storage
  checkinToday = load("checkin_" + today(), null);
  workoutToday = load("workout_" + today(), null);
  if (!profile) { renderSetup(); return; }
  if (tab === "today") renderToday();
  else if (tab === "log") renderLog();
  else if (tab === "progress") renderProgress();
  else if (tab === "stats") renderStats();
  else if (tab === "profile") renderProfile();
}

/* ---------- boot ---------- */
try {
  render();
} catch (e) {
  document.getElementById("app").innerHTML = '<div style="padding:20px;color:#C0392B;font-family:monospace">FEHLER: ' + (e && e.message ? e.message : e) + '</div>';
}
</script>
</body>
</html>
