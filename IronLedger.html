<script>
  // Show any error directly on screen (no dev tools needed on iPhone)
  window.addEventListener('error', function (e) {
    var el = document.getElementById('boot-status') || document.getElementById('root');
    if (el) el.innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:20px;color:#C0392B;background:#fff;">FEHLER:\n' + (e.message || e) + '\n\nDatei: ' + (e.filename||'?') + ' Zeile: ' + (e.lineno||'?') + '</div>';
  });
  window.addEventListener('unhandledrejection', function (e) {
    var el = document.getElementById('boot-status') || document.getElementById('root');
    if (el) el.innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:20px;color:#C0392B;background:#fff;">PROMISE FEHLER:\n' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
  });
  // Track real load/error events per script instead of guessing with a fixed timer.
  // This works correctly even on slow mobile connections.
  var LIBS = ['lib-react', 'lib-reactdom', 'lib-babel'];
  var status = {};
  var failed = [];
  function checkDone() {
    var allSettled = LIBS.every(function (id) { return status[id]; });
    var progressEl = document.getElementById('boot-progress');
    if (progressEl) {
      var doneCount = LIBS.filter(function (id) { return status[id]; }).length;
      progressEl.textContent = '(' + doneCount + '/' + LIBS.length + ')';
    }
    if (allSettled && failed.length) {
      var el = document.getElementById('boot-status');
      if (el) el.innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:20px;color:#C0392B;background:#fff;">Diese Skripte konnten nicht geladen werden:\n' + failed.join(', ') + '\n\nMögliche Ursache: Internetverbindung oder CDN blockiert. Bitte Seite neu laden (evtl. mehrmals) oder später erneut versuchen.</div>';
    }
  }
  LIBS.forEach(function (id) {
    var el = document.getElementById(id);
    if (!el) { status[id] = true; failed.push(id + ' (Tag fehlt)'); checkDone(); return; }
    el.addEventListener('load', function () { status[id] = true; checkDone(); });
    el.addEventListener('error', function () { status[id] = true; failed.push(id); checkDone(); });
  });
  // Absolute safety net: after 25s, if still not resolved, show a message (very slow connections)
  setTimeout(function () {
    var el = document.getElementById('boot-status');
    var stillWaiting = LIBS.some(function (id) { return !status[id]; });
    if (stillWaiting && el) {
      el.innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:20px;color:#B27A00;background:#fff;">Das Laden dauert ungewöhnlich lange (>25s). Möglicherweise ist die Verbindung sehr langsam. Bitte warten oder Seite neu laden.</div>';
    }
  }, 25000);
</script>

// ---- Lightweight built-in charts (no external library — avoids CDN fragility) ----
function MiniLineChart({ series, width = 320, height = 160, yDomain, xLabels }) {
  const pad = { top: 10, right: 10, bottom: 24, left: 34 };
  const w = width - pad.left - pad.right;
  const h = height - pad.top - pad.bottom;
  const allVals = series.flatMap((s) => s.values.filter((v) => v != null));
  const yMin = yDomain ? yDomain[0] : Math.min(...allVals);
  const yMax = yDomain ? yDomain[1] : Math.max(...allVals);
  const yRange = yMax - yMin || 1;
  const n = series[0]?.values.length || 0;
  const xStep = n > 1 ? w / (n - 1) : 0;
  const px = (i) => pad.left + i * xStep;
  const py = (v) => pad.top + h - ((v - yMin) / yRange) * h;
  const gridLines = 4;
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ display: "block" }}>
      {Array.from({ length: gridLines + 1 }, (_, i) => {
        const y = pad.top + (h / gridLines) * i;
        const val = yMax - (yRange / gridLines) * i;
        return (
          <g key={i}>
            <line x1={pad.left} y1={y} x2={pad.left + w} y2={y} stroke="#E2E8E9" strokeWidth="1" />
            <text x={pad.left - 6} y={y + 3} fontSize="9" fill="#67757B" textAnchor="end">{Math.round(val * 10) / 10}</text>
          </g>
        );
      })}
      {(xLabels || []).map((lbl, i) => {
        if (n > 6 && i % Math.ceil(n / 6) !== 0) return null;
        return <text key={i} x={px(i)} y={height - 6} fontSize="9" fill="#67757B" textAnchor="middle">{lbl}</text>;
      })}
      {series.map((s, si) => {
        const pts = s.values.map((v, i) => (v == null ? null : `${px(i)},${py(v)}`)).filter(Boolean).join(" ");
        return (
          <g key={si}>
            <polyline points={pts} fill="none" stroke={s.color || "#0F7B6F"} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
            {s.values.map((v, i) => (v == null ? null : <circle key={i} cx={px(i)} cy={py(v)} r="2.5" fill={s.color || "#0F7B6F"} />))}
          </g>
        );
      })}
    </svg>
  );
}

  return new Date(dateObj.getTime() - off).toISOString().slice(0, 10);

  const c = [...(arr || [])];

// ---- IndexedDB persistent storage (survives app close, iOS-safe) ----
const DB_NAME = "ironledger", STORE = "kv";
let _dbPromise = null;
function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const r = tx.objectStore(STORE).get(key);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
async function idbSet(key, val) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function idbAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const store = tx.objectStore(STORE);
    const keys = store.getAllKeys(), vals = store.getAll();
    const out = {};
    tx.oncomplete = () => { keys.result.forEach((k, i) => (out[k] = vals.result[i])); resolve(out); };
    tx.onerror = () => reject(tx.error);
  });
}
// localStorage mirror as a second safety net
async function getJSON(key, fallback = null) {
  try {
    const v = await idbGet(key);
    if (v != null) return typeof v === "string" ? JSON.parse(v) : v;
  } catch (e) { console.warn("idb get failed", e); }
  try {
    const ls = localStorage.getItem("il:" + key);
    if (ls != null) return JSON.parse(ls);
  } catch {}
  return fallback;
}
async function setJSON(key, value) {
  let ok = false;
  try { await idbSet(key, JSON.stringify(value)); ok = true; } catch (e) { console.warn("idb set failed", e); }
  try { localStorage.setItem("il:" + key, JSON.stringify(value)); ok = true; } catch (e) { console.warn("ls set failed", e); }
  return ok;
}
// Export / import for manual backups
async function exportAllData() {
  const all = await idbAll();
  const parsed = {};
  for (const [k, v] of Object.entries(all)) { try { parsed[k] = typeof v === "string" ? JSON.parse(v) : v; } catch { parsed[k] = v; } }
  return { app: "IronLedger", exportedAt: new Date().toISOString(), data: parsed };
}
async function importAllData(obj) {
  if (!obj || !obj.data) throw new Error("Ungültige Backup-Datei");
  for (const [k, v] of Object.entries(obj.data)) await setJSON(k, v);
  return Object.keys(obj.data).length;
}

function calcAge(dob) {
  const d = new Date(dob);
  const now = new Date();
  let age = now.getFullYear() - d.getFullYear();
  const m = now.getMonth() - d.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < d.getDate())) age--;
  return age;
}

/* ---------- nutrition (with learning) ---------- */

const RATE_OPTIONS = [
  { id: "conservative", label: "Konservativ", pct: 0.12, desc: "Minimale Fettzunahme, langsamster Muskelaufbau" },
  { id: "moderate", label: "Moderat", pct: 0.22, desc: "Guter Kompromiss für DOTS-Ziel" },
  { id: "aggressive", label: "Ambitioniert", pct: 0.4, desc: "Schneller, mehr Fettanteil am Zuwachs" },
];

function calcNutrition(profile, tdeeCorrection = 0) {
  const leanMass = profile.weightKg * (1 - profile.bf / 100);
  const bmr = 370 + 21.6 * leanMass;
  const tdee = bmr * profile.activityMult + tdeeCorrection;
  const rate = RATE_OPTIONS.find((r) => r.id === profile.targetRateId) || RATE_OPTIONS[1];
  const targetWeeklyKg = (rate.pct / 100) * profile.weightKg;
  const dailySurplus = Math.round((targetWeeklyKg * 7700) / 7);
  const calculatedCalories = Math.round(tdee + dailySurplus);
  const calories = profile.manualCalories ? profile.manualCalories : calculatedCalories;
  const projectedWeeklyGainKg = ((calories - tdee) * 7) / 7700;
  const protein = Math.round(profile.weightKg * 2.2);
  const fat = Math.round(profile.weightKg * 0.9);
  const carbs = Math.max(0, Math.round((calories - protein * 4 - fat * 9) / 4));
  return { bmr: Math.round(bmr), tdee: Math.round(tdee), calories, protein, fat, carbs, rate, targetWeeklyKg, projectedWeeklyGainKg, calculatedCalories, tdeeCorrection };
}

function computeWeightTrend(log) {
  if (!log || log.length < 6) return null;
  const sorted = [...log].filter((e) => e.kg > 0).sort((a, b) => a.date.localeCompare(b.date));
  const recent = sorted.slice(-14);
  if (recent.length < 6) return null;
  const half = Math.floor(recent.length / 2);
  const older = recent.slice(0, half);
  const newer = recent.slice(half);
  const avg = (arr) => arr.reduce((s, e) => s + e.kg, 0) / arr.length;
  const spanDays = (new Date(recent[recent.length - 1].date) - new Date(recent[0].date)) / 86400000;
  if (spanDays < 6) return null;
  const kgPerWeek = ((avg(newer) - avg(older)) / (spanDays / 2)) * 7;
  return { kgPerWeek, points: recent.length };
}

function computeAdaptiveCorrection(profile, trendlog) {
  const prev = trendlog.tdeeCorrection || 0;
  const trend = computeWeightTrend(trendlog.bodyweight);
  if (!trend) return { correction: prev, info: null };
  const leanMass = profile.weightKg * (1 - profile.bf / 100);
  const baseTdee = (370 + 21.6 * leanMass) * profile.activityMult;
  const cutoff = Date.now() - 14 * 86400000;
  const intakes = (trendlog.intake || []).filter((e) => new Date(e.date).getTime() >= cutoff && e.kcal > 0);
  const nutNow = calcNutrition(profile, prev);
  const assumedIntake = intakes.length >= 5 ? intakes.reduce((s, e) => s + e.kcal, 0) / intakes.length : nutNow.calories;
  const impliedTdee = assumedIntake - (trend.kgPerWeek * 7700) / 7;
  const corr = Math.max(-500, Math.min(500, impliedTdee - baseTdee));
  const damped = Math.round(prev + (corr - prev) * 0.5);
  return {
    correction: damped,
    info: { actualKgWk: trend.kgPerWeek, points: trend.points, assumedIntake: Math.round(assumedIntake), usedRealIntake: intakes.length >= 5 },
  };
}

function projectedLeanGain(trendlog, sessionsDone) {
  const trend = computeWeightTrend(trendlog.bodyweight);

  let monthlyLean = 0.7 * consistencyFactor;
  if (trend) {
    if (trend.kgPerWeek <= 0) monthlyLean *= 0.35;
    else if (trend.kgPerWeek < 0.1) monthlyLean *= 0.7;
    else if (trend.kgPerWeek > 0.5) monthlyLean *= 0.85;
  }
  const perDay = monthlyLean / 30;
  const elapsedDays = (sessionsDone * 7) / 4;
  return { monthly: monthlyLean, cumulative: perDay * elapsedDays };
}

function computeStreak(loginDates) {
  if (!loginDates || !loginDates.length) return { current: 0, best: 0 };
  const set = new Set(loginDates);
  let current = 0;
  let d = new Date(todayStr());
  while (set.has(todayStrOf(d))) { current++; d.setDate(d.getDate() - 1); }
  const sorted = [...set].sort();
  let best = 0, run = 0, prev = null;
  for (const ds of sorted) {
    if (prev) { const gap = (new Date(ds) - new Date(prev)) / 86400000; run = gap === 1 ? run + 1 : 1; }
    else run = 1;
    best = Math.max(best, run); prev = ds;
  }
  return { current, best };
}

/* ---------- readiness ---------- */

function readinessScore(c) {
  if (!c) return null;
  const sleepScore = Math.min(1, c.sleepHours / 8) * 100;
  const qualScore = (c.sleepQuality / 5) * 100;
  const stressScore = ((5 - c.stress) / 4) * 100;
  const restPainAvg = (c.painShoulderRest + c.painKneeRest + c.painNeckRest) / 3;
  const loadPainAvg = (c.painShoulderLoad + c.painKneeLoad + c.painNeckLoad) / 3;
  const painScore = ((10 - (restPainAvg * 0.6 + loadPainAvg * 0.4)) / 10) * 100;
  const moodScore = ((c.mood ?? 3) / 5) * 100;
  let score = sleepScore * 0.22 + qualScore * 0.15 + stressScore * 0.15 + painScore * 0.33 + moodScore * 0.15;
  if (c.alcoholUnits) score -= Math.min(15, c.alcoholUnits * 4);
  if (c.stiffness) score -= Math.min(10, c.stiffness * 2);
  return Math.round(Math.max(0, Math.min(100, score)));
}

const PATTERN_MUSCLES = {
  squat: ["quads"],
  hinge: ["hamstrings", "back"],
  push_horizontal: ["chest", "triceps"],
  pull_horizontal: ["back", "biceps"],
  pull_vertical: ["back", "biceps"],
  core: ["abs"],
};
const MUSCLE_LANDMARKS = {
  quads: { mev: 6, mav: 12, mrv: 18 },
  hamstrings: { mev: 4, mav: 10, mrv: 16 },
  chest: { mev: 6, mav: 12, mrv: 20 },
  back: { mev: 8, mav: 14, mrv: 22 },

};
const MUSCLE_DE = { quads: "Quadrizeps", hamstrings: "Beinbeuger", chest: "Brust", back: "Rücken", triceps: "Trizeps", biceps: "Bizeps", abs: "Rumpf" };

function computeWeeklyVolume(history) {
  const cutoff = Date.now() - 7 * 24 * 3600 * 1000;
  const totals = {};
  Object.keys(MUSCLE_LANDMARKS).forEach((k) => (totals[k] = 0));
  for (const [pattern, entries] of Object.entries(history)) {
    const muscles = PATTERN_MUSCLES[pattern];
    if (!muscles) continue;
    for (const e of entries || []) {
      if (new Date(e.date).getTime() < cutoff) continue;
      const sc = e.setsCount || 1;
      muscles.forEach((m) => (totals[m] += sc));
    }
  }
  return totals;
}
function volumeStatus(sets, land) {

  if (sets <= land.mav) return { label: "Aufbaubereich", color: "#0F7B6F" };
  if (sets <= land.mrv) return { label: "Hoch — Erholung beobachten", color: "#B27A00" };
  return { label: "Über Maximalvolumen — reduzieren", color: "#C0392B" };
}

/* ---------- fatigue / deload detection ---------- */

function assessFatigue(history, trendlog) {
  const reasons = [];
  const rl = (trendlog.readiness || []).slice(-3);
  if (rl.length === 3) {
    const rAvg = rl.reduce((s, e) => s + e.score, 0) / 3;
    if (rAvg < 55) reasons.push(`Ø-Readiness der letzten 3 Check-ins: ${Math.round(rAvg)} (<55)`);
  }
  const sl = (trendlog.sessions || []).slice(-3);
  if (sl.length === 3) {
    const sAvg = sl.reduce((s, e) => s + e.sessionRpe, 0) / 3;
    if (sAvg >= 8.5) reasons.push(`Ø-Session-RPE der letzten 3 Einheiten: ${sAvg.toFixed(1)} (sehr hoch)`);
  }
  const nameMap = { squat: "Kniebeuge-Muster", hinge: "Kreuzheben-Muster", push_horizontal: "Drück-Muster" };
  for (const key of ["squat", "hinge", "push_horizontal"]) {
    const reps = (history[key] || []).filter((h) => h.type === "reps");
    if (reps.length >= 3) {
      const l3 = reps.slice(-3).map((h) => h.e1rm);
      if (l3[2] < l3[1] && l3[1] < l3[0]) reasons.push(`e1RM-Abwärtstrend: ${nameMap[key]} (3 Einheiten in Folge)`);
    }
  }
  const perfDecline = reasons.some((r) => r.startsWith("e1RM"));
  const fatigueSignal = reasons.some((r) => r.startsWith("Ø-"));
  return { deloadRecommended: perfDecline && fatigueSignal, reasons };
}

/* ---------- COACH ENGINE ---------- */

// Mesocycle: a periodized block that ramps volume/intensity then deloads.
// weekInBlock is derived from completed sessions so it advances automatically.
const MESO = {
  lengthWeeks: 5, // 4 accumulation + 1 deload
  // per week: RPE cap and volume multiplier applied on top of base template
  weeks: [
    { phase: "Akkumulation 1", rpeCap: 7, volMult: 1.0, repBias: 0 },
    { phase: "Akkumulation 2", rpeCap: 8, volMult: 1.1, repBias: 0 },
    { phase: "Intensivierung 1", rpeCap: 8.5, volMult: 1.0, repBias: -1 },
    { phase: "Intensivierung 2", rpeCap: 9, volMult: 0.9, repBias: -2 },
    { phase: "Deload", rpeCap: 6, volMult: 0.55, repBias: 0 },
  ],
};

function mesoState(trendlog) {
  const sessions = trendlog.sessions || [];
  const done = sessions.length;
  // 4 sessions per week in the rotation → derive week index
  const weekAbs = Math.floor(done / 4);
  const weekInBlock = weekAbs % MESO.lengthWeeks;
  const blockNumber = Math.floor(weekAbs / MESO.lengthWeeks) + 1;
  return { ...MESO.weeks[weekInBlock], weekInBlock, blockNumber, weekAbs, sessionsDone: done };
}

// DUP: vary rep focus by session slot within the week for concurrent strength+hypertrophy
const DUP_BY_DAY = { A: "kraft", B: "hypertrophie", C: "kraft", D: "hypertrophie" };
function applyDUP(ex, dayId, repBias) {
  if (ex.type !== "reps") return ex;
  const focus = DUP_BY_DAY[dayId] || "kraft";
  if (focus === "hypertrophie" && !ex.isRehab) {
    return { ...ex, reps: Math.max(3, ex.reps + 3 + repBias), dupFocus: "Hypertrophie" };
  }
  return { ...ex, reps: Math.max(1, ex.reps + repBias), dupFocus: "Kraft" };
}

// Progress verdict per lift: is the athlete responding well?
function liftVerdict(history, key, sessionsDone) {
  const reps = (history[key] || []).filter((h) => h.type === "reps" && h.e1rm > 0);
  if (reps.length < 3) return { status: "sammelt", color: "#67757B", text: "Datenbasis wächst noch" };
  const recent = reps.slice(-4);
  const slope = (recent[recent.length - 1].e1rm - recent[0].e1rm) / (recent.length - 1);
  const avgRpe = recent.reduce((s, r) => s + (r.rpe || 8), 0) / recent.length;
  if (slope > 0.5) return { status: "steigt", color: "#0F7B6F", text: `e1RM steigt (+${slope.toFixed(1)} kg/Einheit)` };
  if (slope >= -0.3 && avgRpe >= 9) return { status: "grenzwertig", color: "#B27A00", text: "Plateau bei hohem RPE — Ermüdung wahrscheinlich" };
  if (slope >= -0.3) return { status: "haltend", color: "#B27A00", text: "Stagnation — Reiz evtl. zu niedrig" };
  return { status: "fällt", color: "#C0392B", text: `e1RM fällt (${slope.toFixed(1)} kg/Einheit)` };
}

// Volume autoregulation: nudge weekly sets toward MAV based on recovery signals.
function volumeVerdict(history, trendlog) {
  const vol = computeWeeklyVolume(history);
  const rl = (trendlog.readiness || []).slice(-4);
  const avgReadiness = rl.length ? rl.reduce((s, e) => s + e.score, 0) / rl.length : null;
  const recovering = avgReadiness == null || avgReadiness >= 60;
  const recs = [];
  for (const [m, land] of Object.entries(MUSCLE_LANDMARKS)) {
    const sets = vol[m] || 0;
    if (sets < land.mev) recs.push({ m, action: "rauf", detail: `${MUSCLE_DE[m]}: unter MEV (${sets}<${land.mev}) → mehr Volumen` });
    else if (sets > land.mrv) recs.push({ m, action: "runter", detail: `${MUSCLE_DE[m]}: über MRV (${sets}>${land.mrv}) → reduzieren` });
    else if (sets >= land.mav && !recovering) recs.push({ m, action: "runter", detail: `${MUSCLE_DE[m]}: hohes Volumen + schlechte Erholung → halten/reduzieren` });
  }
  return { recs, avgReadiness, recovering };
}

// Overall coach summary shown on Today
function coachSummary(history, trendlog, stages) {
  const meso = mesoState(trendlog);
  const verdicts = BIG_THREE.map((l) => ({ ...l, v: liftVerdict(history, l.key, meso.sessionsDone) }));
  const vv = volumeVerdict(history, trendlog);
  const falling = verdicts.filter((x) => x.v.status === "fällt").length;
  const rising = verdicts.filter((x) => x.v.status === "steigt").length;
  let headline, tone;
  if (meso.phase === "Deload") { headline = "Deload-Woche — geplante Erholung, Reize bewusst niedrig."; tone = "#B27A00"; }
  else if (falling >= 2) { headline = "Mehrere Lifts fallen — Ermüdung oder zu wenig Erholung. Coach drosselt."; tone = "#C0392B"; }
  else if (rising >= 2) { headline = "Du fährst gut — Kraft steigt, Kurs beibehalten."; tone = "#0F7B6F"; }
  else { headline = "Solider Kurs — kleinere Anpassungen laufen automatisch."; tone = "#67757B"; }
  return { meso, verdicts, vv, headline, tone };
}

function applyReadinessDamping(ex, readiness) {
  if (ex.type !== "reps" || readiness == null) return ex;
  if (readiness < 45) return { ...ex, sets: Math.max(2, ex.sets - 1), rpeTarget: Math.max(5, ex.rpeTarget - 2), damped: true };
  if (readiness < 60) return { ...ex, rpeTarget: Math.max(5, ex.rpeTarget - 1), damped: true };
  return ex;
}

// RTS-style: derive target working weight from a *projected* e1RM that trends
// upward only when recent same-pattern sessions were completed at/under target RPE.
function projectedE1RM(hist) {
  const reps = hist.filter((h) => h.type === "reps" && h.e1rm > 0);
  if (!reps.length) return null;
  const last = reps[reps.length - 1];
  if (reps.length < 2) return last.e1rm;
  const prev = reps[reps.length - 2];
  const rising = last.e1rm >= prev.e1rm;
  // small progressive step when trend is up and last RPE wasn't maxed out
  const step = rising && last.rpe <= 8.5 ? 1.01 : 1.0;
  return last.e1rm * step;
}

function recommendWeight(ex, history) {
  if (ex.type !== "reps") return null;
  const hist = (history[ex.pattern] || []).filter((h) => h.type === "reps");
  if (!hist.length) return null;
  const e1 = projectedE1RM(hist);
  const rir = 10 - ex.rpeTarget;
  const w = e1 / (1 + (ex.reps + rir) * 0.0333);
  return round25(w);
}

// Per-set load prescription: top set at target, back-off sets reduced to hold RPE
// roughly constant as fatigue accumulates (RTS fatigue-percent concept, simplified).
function setPrescription(topWeight, sets, type) {
  if (!topWeight || type !== "reps") return null;
  const dropPerSet = 0.03; // ~3% off per following set to keep RPE stable
  return Array.from({ length: sets }, (_, i) => round25(topWeight * (1 - dropPerSet * i)));
}

function buildSessionCore(dayIndex, c, hist, trendlog, stages, opts = {}) {
  const tmpl = SESSIONS[dayIndex % SESSIONS.length];
  const r = readinessScore(c);
  const pain = { shoulderLoad: c.painShoulderLoad, kneeLoad: c.painKneeLoad, neckLoad: c.painNeckLoad };
  const stagesSafe = { bench: 0, squat: 0, ...(stages || {}) };
  const decisions = [];
  const fatigue = assessFatigue(hist, trendlog);
  const meso = mesoState(trendlog);
  // Deload triggers either from the planned mesocycle week OR from acute fatigue signals
  const mesoDeload = meso.phase === "Deload";
  const deloadActive = (fatigue.deloadRecommended || mesoDeload) && !opts.skipDeload;

  const liftStageUsed = {};
  const tempNotes = [];
  const exercises = tmpl.slots.map((slot) => {
    const res = resolveSlot(slot, pain, stagesSafe);
    let ex = res.ex;
    if (res.lift) {
      liftStageUsed[res.lift] = RETURN_STAGES[res.lift].stages[res.usedStage].name;
      if (res.temp) tempNotes.push(`${RETURN_STAGES[res.lift].label}: Schmerz heute ≥6/10 → temporär zurückgestuft auf ${liftStageUsed[res.lift]}`);
    }
    // DUP rep focus by day + mesocycle rep bias
    ex = applyDUP(ex, tmpl.id, meso.repBias);
    // Mesocycle volume multiplier (rounded, min 1 working set kept)
    if (ex.type === "reps" && !ex.isRehab && meso.volMult !== 1) {
      ex = { ...ex, sets: Math.max(1, Math.round(ex.sets * meso.volMult)) };
    }
    // Mesocycle RPE cap
    if (ex.type === "reps" && ex.rpeTarget > meso.rpeCap) {
      ex = { ...ex, rpeTarget: meso.rpeCap };
    }
    if (deloadActive && ex.type === "reps") {
      ex = { ...ex, sets: Math.max(2, Math.ceil(ex.sets * 0.6)), rpeTarget: Math.min(ex.rpeTarget, 6), deloaded: true };
    } else {
      ex = applyReadinessDamping(ex, r);
    }
    const rec = recommendWeight(ex, hist);
    const perSet = setPrescription(rec, ex.sets, ex.type);
    return { ...ex, recommendedWeight: rec, perSet, exerciseNote: "" };
  });

  decisions.push(`Mesozyklus Block ${meso.blockNumber}, Woche ${meso.weekInBlock + 1}/5 — ${meso.phase} (RPE-Cap ${meso.rpeCap}, Volumen ×${meso.volMult})`);
  if (liftStageUsed.squat) decisions.push(`Squat-Slot nach Rückkehr-Fahrplan: ${liftStageUsed.squat}`);
  if (liftStageUsed.bench) decisions.push(`Push-Slot nach Rückkehr-Fahrplan: ${liftStageUsed.bench}`);
  tempNotes.forEach((t) => decisions.push(t));
  if (tmpl.slots.includes("hinge") && c.painKneeLoad >= 6) decisions.push("Knie-Schmerz hoch → Kreuzheben-RPE-Ziel auf 7 gesenkt");

  if (!deloadActive) {
    if (r != null && r < 45) decisions.push(`Readiness ${r} (<45) → pro Übung 1 Satz weniger, RPE-Ziel −2`);
    else if (r != null && r < 60) decisions.push(`Readiness ${r} (<60) → RPE-Ziele um 1 gesenkt`);
  }

  const rehab = buildRehabItems(c).map((ex) => ({ ...ex, recommendedWeight: null, exerciseNote: "" }));
  if (rehab.length) decisions.push(`${rehab.length} Reha-Übung(en) ergänzt (gemeldeter Schmerz ≥3/10)`);

  if (deloadActive) decisions.push("DELOAD aktiv: " + fatigue.reasons.join(" · ") + " → Volumen ~−40 %, RPE max. 6");
  else if (fatigue.reasons.length) decisions.push("Ermüdungs-Monitor (nur Info): " + fatigue.reasons.join(" · "));
  if (opts.skipDeload && fatigue.deloadRecommended) decisions.push("Deload manuell übersprungen — Empfehlung bleibt bestehen");

  return { date: todayStr(), dayId: tmpl.id, label: tmpl.label, readiness: r, deload: deloadActive, deloadRecommended: fatigue.deloadRecommended, exercises: [...exercises, ...rehab], decisions };
}

const emptyCheckin = () => ({
  sleepHours: 7.5, sleepQuality: 3, stress: 3, mood: 3, bodyweight: "",
  painShoulderRest: 0, painShoulderLoad: 0,
  painKneeRest: 0, painKneeLoad: 0,
  painNeckRest: 0, painNeckLoad: 0,
  restingHR: "", neatSteps: "", alcoholUnits: 0, stiffness: 0, actualKcalYesterday: "",
  notes: { schulter: "", knie: "", nacken: "", sonstiges: "" },
});

const TABS = [
  { id: "today", label: "Heute", icon: Flame },
  { id: "week", label: "Woche", icon: CalendarDays },
  { id: "log", label: "Eintragen", icon: ClipboardList },
  { id: "progress", label: "Verlauf", icon: TrendingUp },
  { id: "profile", label: "Profil", icon: Settings },
];

function IronLedger() {
  const [ready, setReady] = useState(false);
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("today");
  const [checkin, setCheckin] = useState(null);
  const [checkinDraft, setCheckinDraft] = useState(emptyCheckin());
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [session, setSession] = useState(null);
  const [history, setHistory] = useState({});
  const [trendlog, setTrendlog] = useState(EMPTY_TRENDLOG);
  const [settings, setSettings] = useState({ dayIndex: 0 });
  const [postQ, setPostQ] = useState({ sessionRpe: 7, notes: { technik: "", schmerz: "", sonstiges: "" } });
  const [checklist, setChecklist] = useState({ calories: false, macros: false, trained: false, journal: false });
  const [savedFlash, setSavedFlash] = useState("");

  useEffect(() => {
    (async () => {
      const p = await getJSON("profile");
      const sRaw = await getJSON("settings", { dayIndex: 0, stages: { bench: 0, squat: 0 } });
      const s = { ...sRaw, stages: { bench: 0, squat: 0, ...(sRaw.stages || {}) } };
      let c = await getJSON("checkin:" + todayStr());
      let recoveredWorkout = null;
      if (!c) {
        const latest = await getJSON("checkin_latest");
        // Accept the latest check-in if it's from today (covers any date-key edge cases)
        if (latest && latest.date === todayStr()) {
          c = latest;
          // re-persist under the dated key so it's found directly next time
          await setJSON("checkin:" + todayStr(), c);
        }
      }
      if (c) {
        recoveredWorkout = await getJSON("workout:" + todayStr());
        if (!recoveredWorkout) {
          const wLatest = await getJSON("workout_latest");
          if (wLatest && wLatest.date === todayStr()) recoveredWorkout = wLatest;
        }
      }
      const tl = await getJSON("trendlog", EMPTY_TRENDLOG);
      const cl = await getJSON("checklist:" + todayStr(), { calories: false, macros: false, trained: false, journal: false });
      const hist = {};
      for (const pat of ["squat", "hinge", "push_horizontal", "pull_horizontal", "pull_vertical", "neck_iso", "rehab_shoulder", "rehab_knee", "rehab_neck"]) {
        hist[pat] = (await getJSON("history:" + pat, [])) || [];
      }
      setProfile(p);
      setSettings(s);
      setHistory(hist);
      setTrendlog(tl);
      setChecklist(cl);
      if (c) {
        setCheckin(c);
        let w = recoveredWorkout;
        if (!w) {
          try { w = buildSessionCore(s.dayIndex, c, hist, tl, s.stages); }
          catch (e) { console.error("rebuild failed", e); w = null; }
        }
        if (w) setSession(w);
      }
      setReady(true);
    })();
  }, []);

  const flash = (msg) => { setSavedFlash(msg); setTimeout(() => setSavedFlash(""), 2200); };

  async function toggleChecklist(key) {
    const cl = { ...checklist, [key]: !checklist[key] };
    setChecklist(cl);
    await setJSON("checklist:" + todayStr(), cl);
  }

  async function saveProfile(p, silent) { await setJSON("profile", p); setProfile(p); if (!silent) flash("Profil gespeichert"); }

  async function submitCheckin() {
    const c = { ...checkinDraft, date: todayStr() };
    await setJSON("checkin:" + todayStr(), c);
    await setJSON("checkin_latest", c); // stable fallback key
    // verify the write actually persisted; warn if storage is unavailable
    const verify = await getJSON("checkin:" + todayStr());
    if (!verify) {
      flash("Achtung: Speichern fehlgeschlagen — Check-in evtl. nicht dauerhaft gesichert.");
    }
    let tl = { ...trendlog };
    const r = readinessScore(c);
    tl.readiness = upsertByDate(tl.readiness, { date: todayStr(), score: r });
    tl.pain = upsertByDate(tl.pain, { date: todayStr(), sR: c.painShoulderRest, sL: c.painShoulderLoad, kR: c.painKneeRest, kL: c.painKneeLoad, nR: c.painNeckRest, nL: c.painNeckLoad });
    if (c.bodyweight && +c.bodyweight > 0) tl.bodyweight = upsertByDate(tl.bodyweight, { date: todayStr(), kg: +c.bodyweight });
    if (c.actualKcalYesterday && +c.actualKcalYesterday > 0) tl.intake = upsertByDate(tl.intake, { date: todayStr(), kcal: +c.actualKcalYesterday });
    // login streak
    tl.loginDates = Array.from(new Set([...(tl.loginDates || []), todayStr()])).sort();
    const adapt = computeAdaptiveCorrection(profile, tl);
    tl.tdeeCorrection = adapt.correction;
    tl.adaptInfo = adapt.info;
    // Build the session FIRST, then flip the view — so it never renders with a null session
    let generated = null;
    try {
      generated = buildSessionCore(settings.dayIndex, c, history, tl, settings.stages);
    } catch (e) {
      console.error("session build failed", e);
      flash("Fehler beim Erstellen des Plans — bitte erneut versuchen.");
      return;
    }
    setSession(generated);
    setTrendlog(tl);
    setCheckin(c);
    await setJSON("trendlog", tl);
    await setJSON("workout:" + todayStr(), generated);
    await setJSON("workout_latest", { ...generated, date: todayStr() });
    flash("Check-in gespeichert — Plan erstellt");
  }

  async function saveSetLog(exIdx, sets, exerciseNote) {
    const s2 = { ...session };
    s2.exercises[exIdx].loggedSets = sets;
    s2.exercises[exIdx].exerciseNote = exerciseNote;
    setSession(s2);
    await setJSON("workout:" + todayStr(), s2);
    await setJSON("workout_latest", { ...s2, date: todayStr() });
  }

  async function finishSession() {
    const newHist = { ...history };
    for (const ex of session.exercises) {
      if (!ex.loggedSets || !ex.loggedSets.length) continue;
      const arr = newHist[ex.pattern] ? [...newHist[ex.pattern]] : [];
      if (ex.type === "reps") {
        const best = ex.loggedSets.reduce((a, b) => {
          const e1a = a.weight * (1 + (a.reps + (10 - a.rpe)) * 0.0333);
          const e1b = b.weight * (1 + (b.reps + (10 - b.rpe)) * 0.0333);
          return e1b > e1a ? b : a;
        });
        const e1rm = round25(best.weight * (1 + (best.reps + (10 - best.rpe)) * 0.0333));
        arr.push({ date: todayStr(), exerciseName: ex.name, type: "reps", weight: best.weight, reps: best.reps, rpe: best.rpe, e1rm, pain: best.pain || 0, note: ex.exerciseNote || "", setsCount: ex.loggedSets.length });
      } else {
        const best = ex.loggedSets[ex.loggedSets.length - 1];
        arr.push({ date: todayStr(), exerciseName: ex.name, type: "iso", durationSec: best.durationSec, load: best.load, pain: best.pain || 0, note: ex.exerciseNote || "", setsCount: ex.loggedSets.length });
      }
      newHist[ex.pattern] = arr;
      await setJSON("history:" + ex.pattern, arr);
    }
    setHistory(newHist);
    let tl = { ...trendlog };
    tl.sessions = upsertByDate(tl.sessions, { date: todayStr(), sessionRpe: postQ.sessionRpe, dayId: session.dayId });
    await setJSON("trendlog", tl);
    setTrendlog(tl);
    const s2 = { ...session, postQuestionnaire: postQ, completed: true };
    await setJSON("workout:" + todayStr(), s2);
    await setJSON("workout_latest", { ...s2, date: todayStr() });
    setSession(s2);
    const ns = { ...settings, dayIndex: (settings.dayIndex + 1) % SESSIONS.length };
    await setJSON("settings", ns);
    setSettings(ns);
    const cl = { ...checklist, trained: true, journal: true };
    setChecklist(cl);
    await setJSON("checklist:" + todayStr(), cl);
    flash("Einheit abgeschlossen — nächste Session vorbereitet");
  }

  async function skipDeload() {
    const generated = buildSessionCore(settings.dayIndex, checkin, history, trendlog, settings.stages, { skipDeload: true });
    setSession(generated);
    await setJSON("workout:" + todayStr(), generated);
    await setJSON("workout_latest", { ...generated, date: todayStr() });
    flash("Deload übersprungen — normale Einheit geladen");
  }

  async function changeStage(lift, delta) {
    const cur = settings.stages?.[lift] ?? 0;
    const next = Math.max(0, Math.min(RETURN_STAGES[lift].stages.length - 1, cur + delta));
    if (next === cur) return;
    const ns = { ...settings, stages: { ...settings.stages, [lift]: next } };
    await setJSON("settings", ns);
    setSettings(ns);
    if (checkin) {
      const g = buildSessionCore(ns.dayIndex, checkin, history, trendlog, ns.stages);
      setSession(g);
      await setJSON("workout:" + todayStr(), g);
      await setJSON("workout_latest", { ...g, date: todayStr() });
    }
    flash(RETURN_STAGES[lift].label + ": jetzt " + RETURN_STAGES[lift].stages[next].name);
  }

  if (!ready) return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#0F7B6F 0%,#0A5A51 100%)", color: "#fff", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'IBM Plex Sans', system-ui, sans-serif", gap: 16 }}>
      <div style={{ width: 76, height: 76, borderRadius: 18, background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid rgba(255,255,255,0.25)" }}>
        <Dumbbell size={38} color="#fff" />
      </div>
      <div style={{ fontFamily: "'IBM Plex Sans Condensed', sans-serif", fontWeight: 700, fontSize: 24, letterSpacing: "0.06em", textTransform: "uppercase" }}>Iron Ledger</div>
      <div style={{ fontSize: 12, opacity: 0.7, letterSpacing: "0.2em", textTransform: "uppercase" }}>wird geladen…</div>
    </div>
  );

  return (
    <div className="min-h-screen bg-paper ink" style={{ fontFamily: "'IBM Plex Sans', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        .display { font-family: 'IBM Plex Sans Condensed', sans-serif; letter-spacing: 0.04em; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        :root { color-scheme: light; }
        .bg-paper { background: #F6F8F8; }
        .bg-card { background: #FFFFFF; }
        .ink { color: #101619; }
        .muted { color: #67757B; }
        .accent { color: #0F7B6F; }
        .danger { color: #C0392B; }
        .hairline { border-color: #E2E8E9; }
        .hairline-accent { border-color: rgba(15,123,111,0.4); }
        .hairline-teal { border-color: #0F7B6F; }
        .hairline-danger { border-color: rgba(192,57,43,0.5); }
        .btn-primary { background: #0F7B6F; color: #FFFFFF; }
        .btn-primary:active { background: #0C665C; }
        .bar-track { background: #E2E8E9; }
        .tiny { font-size: 10px; }
        .tracked { letter-spacing: 0.25em; }
        input[type=radio], input[type=checkbox] { accent-color: #0F7B6F; width: 16px; height: 16px; }
        input::placeholder, textarea::placeholder { color: #9AA6AB; }
        button { font-family: inherit; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 2px; background: #E2E8E9; border-radius: 1px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 2px; background: #0F7B6F; cursor: pointer; margin-top: -6px; }
        summary::-webkit-details-marker { display: none; }
      `}</style>

      {!profile ? (
        <SetupScreen onSave={saveProfile} />
      ) : (
        <div className="max-w-3xl mx-auto pb-24">
          <header className="px-5 pt-7 pb-4 flex items-center justify-between border-b hairline">
            <div className="flex items-center gap-3">
              <div style={{ width: 42, height: 42, borderRadius: 11, background: "linear-gradient(160deg,#0F7B6F,#0A5A51)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Dumbbell size={22} color="#fff" />
              </div>
              <div>
                <div className="mono tiny uppercase tracked muted">Iron Ledger</div>
                <div className="display text-xl font-bold uppercase tracking-wide">{new Date().toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "short" })}</div>
              </div>
            </div>
            {checkin && <ReadinessDial value={readinessScore(checkin)} />}
          </header>

          {savedFlash && (
            <div className="mx-5 mt-4 bar-track border hairline-accent accent text-sm px-4 py-2 rounded flex items-center gap-2">
              <Check size={14} /> {savedFlash}
            </div>
          )}

          <main className="px-5 pt-5">
            {tab === "today" && (
              <TodayTab
                checkin={checkin} checkinDraft={checkinDraft} setCheckinDraft={setCheckinDraft}
                showAdvanced={showAdvanced} setShowAdvanced={setShowAdvanced}
                submitCheckin={submitCheckin} session={session} profile={profile}
                trendlog={trendlog} onSkipDeload={skipDeload} stages={settings.stages} onChangeStage={changeStage}
                checklist={checklist} onToggleChecklist={toggleChecklist} history={history}
              />
            )}
            {tab === "log" && (
              <LogTab session={session} saveSetLog={saveSetLog} postQ={postQ} setPostQ={setPostQ} finishSession={finishSession} />
            )}
            {tab === "week" && <WeekTab stages={settings.stages} history={history} trendlog={trendlog} />}
            {tab === "progress" && <ProgressTab history={history} trendlog={trendlog} />}
            {tab === "profile" && <ProfileTab profile={profile} onSave={saveProfile} tdeeCorrection={trendlog.tdeeCorrection || 0} />}
          </main>
        </div>
      )}

      <nav className="fixed bottom-0 left-0 right-0 bg-card border-t hairline">
        <div className="max-w-3xl mx-auto grid grid-cols-5">
          {TABS.map((t) => {
            const Icon = t.icon;
            const active = tab === t.id;
            return (
              <button key={t.id} onClick={() => setTab(t.id)} className={`flex flex-col items-center gap-1 py-3 text-xs ${active ? "accent" : "muted"}`}>
                <Icon size={18} />{t.label}
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

/* ---------- Readiness dial ---------- */

function ReadinessDial({ value }) {
  const color = value == null ? "#67757B" : value < 45 ? "#C0392B" : value < 65 ? "#B27A00" : "#0F7B6F";
  const r = 26, c = 2 * Math.PI * r;
  return (
    <div className="relative w-16 h-16 flex items-center justify-center">
      <svg width="64" height="64" className="-rotate-90">
        <circle cx="32" cy="32" r={r} stroke="#E2E8E9" strokeWidth="6" fill="none" />
        <circle cx="32" cy="32" r={r} stroke={color} strokeWidth="6" fill="none" strokeDasharray={c} strokeDashoffset={c - ((value ?? 0) / 100) * c} strokeLinecap="round" />
      </svg>
      <div className="absolute display font-bold text-sm" style={{ color }}>{value ?? "–"}</div>
    </div>
  );
}

/* ---------- Today ---------- */

function TodayTab({ checkin, checkinDraft, setCheckinDraft, showAdvanced, setShowAdvanced, submitCheckin, session, profile, trendlog, onSkipDeload, stages, onChangeStage, checklist, onToggleChecklist, history }) {
  if (!checkin) {
    const d = checkinDraft;
    const set = (k, v) => setCheckinDraft({ ...d, [k]: v });
    return (
      <div>
        <div className="text-sm muted mb-4">Morgen-Check-in — legt Ernährung & Training für heute fest.</div>
        <div className="space-y-5">
          <SliderField label="Schlaf (Stunden)" min={3} max={10} step={0.5} value={d.sleepHours} onChange={(v) => set("sleepHours", v)} />
          <SliderField label="Schlafqualität" min={1} max={5} step={1} value={d.sleepQuality} onChange={(v) => set("sleepQuality", v)} />
          <SliderField label="Stresslevel" min={1} max={5} step={1} value={d.stress} onChange={(v) => set("stress", v)} />
          <SliderField label="Stimmung / Motivation" min={1} max={5} step={1} value={d.mood} onChange={(v) => set("mood", v)} />

          </Field>

          <div className="text-xs uppercase tracking-wide muted pt-3 border-t hairline">Schmerz — getrennt nach Ruhe & Belastung (NRS 0–10)</div>
          <PainPair label="Schulter" restVal={d.painShoulderRest} loadVal={d.painShoulderLoad} onRest={(v) => set("painShoulderRest", v)} onLoad={(v) => set("painShoulderLoad", v)} />
          <PainPair label="Knie" restVal={d.painKneeRest} loadVal={d.painKneeLoad} onRest={(v) => set("painKneeRest", v)} onLoad={(v) => set("painKneeLoad", v)} />
          <PainPair label="Nacken" restVal={d.painNeckRest} loadVal={d.painNeckLoad} onRest={(v) => set("painNeckRest", v)} onLoad={(v) => set("painNeckLoad", v)} />

          <button onClick={() => setShowAdvanced(!showAdvanced)} className="text-xs accent underline">

          {showAdvanced && (
            <div className="space-y-4 bg-card border hairline rounded p-3">
              <Field label="Ruhepuls heute Morgen (optional, bpm)"><input type="number" value={d.restingHR} onChange={(e) => set("restingHR", e.target.value)} className="w-full bg-paper border hairline rounded px-3 py-2 text-sm" /></Field>
              <Field label="Geschätzte Schritte gestern (optional)"><input type="number" value={d.neatSteps} onChange={(e) => set("neatSteps", e.target.value)} className="w-full bg-paper border hairline rounded px-3 py-2 text-sm" /></Field>
              <Field label="Tatsächlich gegessene kcal gestern (optional — macht die TDEE-Korrektur präziser)"><input type="number" value={d.actualKcalYesterday} onChange={(e) => set("actualKcalYesterday", e.target.value)} className="w-full bg-paper border hairline rounded px-3 py-2 text-sm" /></Field>
              <SliderField label="Alkohol gestern (Einheiten)" min={0} max={8} step={1} value={d.alcoholUnits} onChange={(v) => set("alcoholUnits", v)} />
              <SliderField label="Morgensteifigkeit allgemein" min={0} max={5} step={1} value={d.stiffness} onChange={(v) => set("stiffness", v)} />
            </div>
          )}

          <div className="text-xs uppercase tracking-wide muted pt-3 border-t hairline">Notizen (optional, strukturiert)</div>
          <textarea placeholder="Schulter — Beobachtungen" value={d.notes.schulter} onChange={(e) => set("notes", { ...d.notes, schulter: e.target.value })} className="notearea" rows={2} />

          <textarea placeholder="Sonstiges" value={d.notes.sonstiges} onChange={(e) => set("notes", { ...d.notes, sonstiges: e.target.value })} className="notearea" rows={2} />

        </div>

    );
  }

  const corr = trendlog.tdeeCorrection || 0;
  const nutrition = calcNutrition(profile, corr);
  const info = trendlog.adaptInfo;
  const streak = computeStreak(trendlog.loginDates);
  if (!session) {
    return <div className="text-sm muted py-10 text-center">Plan wird erstellt…</div>;
  }
  let coach = null;
  try { coach = coachSummary(history || {}, trendlog || EMPTY_TRENDLOG, stages); }
  catch (e) { console.error("coach failed", e); coach = null; }

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between bg-card border hairline rounded p-3">
        <div className="flex items-center gap-2">
          <Flame size={18} className="accent" />
          <div>
            <div className="mono text-lg font-semibold accent leading-none">{streak.current} Tage</div>
            <div className="tiny muted mt-0.5">Login-Streak in Folge</div>
          </div>
        </div>
        <div className="text-right">
          <div className="mono text-sm ink">{streak.best}</div>
          <div className="tiny muted">Bestwert</div>
        </div>
      </div>

      <CoachCard coach={coach} />
      <section>
        <div className="text-xs uppercase tracking-wide muted mb-2 flex items-center gap-1"><Flame size={13} /> Ernährung heute</div>
        <div className="grid grid-cols-4 gap-2">
          <Stat label="kcal" value={nutrition.calories} />
          <Stat label="Protein" value={nutrition.protein + "g"} />
          <Stat label="Fett" value={nutrition.fat + "g"} />
          <Stat label="Carbs" value={nutrition.carbs + "g"} />
        </div>
        <div className="text-xs muted mt-2">
          TDEE ≈ {nutrition.tdee} kcal · Ziel-Rate: {nutrition.rate.label} ({nutrition.rate.pct}%/Woche) · prognostiziert ≈ <span className="accent mono">{nutrition.projectedWeeklyGainKg.toFixed(2)} kg/Wo</span>
        </div>
        {info ? (
          <div className="text-xs accent mt-1">
            Lernende Korrektur aktiv: {corr >= 0 ? "+" : ""}{corr} kcal auf TDEE — gemessener Trend {info.actualKgWk.toFixed(2)} kg/Wo aus {info.points} Wiegungen{info.usedRealIntake ? `, Ø-Intake ${info.assumedIntake} kcal` : " (Annahme: du isst ≈ Zielkalorien)"}.
          </div>
        ) : (
          <div className="text-xs muted mt-1">
            Lernende Kalorien-Korrektur startet automatisch ab ~6 Wiegungen über ≥1 Woche — trag dafür morgens dein Gewicht ein.

        )}

      {session?.deload && (
        <div className="bg-card border hairline-danger rounded p-3 text-xs">

        </div>
      )}

      <section>
        <div className="text-xs uppercase tracking-wide muted mb-2 flex items-center gap-1"><Dumbbell size={13} /> Training — {session?.label}</div>
        <div className="space-y-2">
          {(session?.exercises || []).map((ex, i) => <ExerciseCard key={i} ex={ex} />)}
        </div>
      </section>

      <section>
        <div className="text-xs uppercase tracking-wide muted mb-2">Rückkehr-Fahrplan — KDK-Fokus</div>
        <div className="space-y-2">
          {["squat", "bench"].map((lift) => {
            const cfg = RETURN_STAGES[lift];
            const idx = (stages && stages[lift]) || 0;
            const st = cfg.stages[idx];
            const adv = advanceReady(lift, trendlog);
            return (
              <div key={lift} className="bg-card border hairline rounded p-3">
                <div className="flex justify-between items-center">
                  <div className="text-sm font-medium">{cfg.label}</div>
                  <div className="flex gap-1">
                    <button onClick={() => onChangeStage(lift, -1)} disabled={idx === 0} className="stgbtn">−</button>
                    <button onClick={() => onChangeStage(lift, 1)} disabled={idx === cfg.stages.length - 1} className="stgbtn">+</button>
                  </div>
                </div>
                <div className="text-xs accent mt-1">{st.name}</div>
                <div className="text-xs muted">Aufstiegskriterium: {st.advance}</div>
                <div className="text-xs mt-1" style={{ color: adv.ready ? "#0F7B6F" : "#67757B" }}>
                  {adv.ready ? "✓ " : ""}{adv.detail}
                </div>
              </div>
            );
          })}
          <div className="bg-card border hairline rounded p-3 text-xs muted">
            <span className="text-sm font-medium ink">Kreuzheben</span> — schmerzfrei, daher Prioritätslift: volle Progression, 2×/Woche im Plan.

        </div>

            {(session?.decisions || []).map((d, i) => <li key={i} className="text-xs muted">• {d}</li>)}

    <section className="bg-card border hairline rounded p-4">

function DailyChecklist({ checklist, onToggle, nutrition }) {
  const items = [
    { key: "calories", label: `Kalorien getroffen (~${nutrition.calories} kcal)` },
    { key: "macros", label: `Makros getroffen (P ${nutrition.protein} / F ${nutrition.fat} / C ${nutrition.carbs})` },
    { key: "trained", label: "Training absolviert" },
    { key: "journal", label: "Journal / Fragebogen ausgefüllt" },
  ];
  const done = items.filter((i) => checklist[i.key]).length;
  const allDone = done === items.length;
  return (
    <section className="bg-card border hairline rounded p-4">
      <div className="tiny uppercase tracked muted mb-2 flex items-center gap-1"><ListChecks size={12} /> Tages-Checkliste</div>
      <div className="space-y-2">
        {items.map((it) => (
          <button key={it.key} onClick={() => onToggle(it.key)} className="w-full flex items-center gap-3 text-left">
            <span className="check-box" style={{ background: checklist[it.key] ? "#0F7B6F" : "transparent", borderColor: checklist[it.key] ? "#0F7B6F" : "#C4CED1" }}>
              {checklist[it.key] && <Check size={12} color="#fff" />}
            </span>
            <span className={`text-sm ${checklist[it.key] ? "muted line-through" : "ink"}`}>{it.label}</span>
          </button>
        ))}
      </div>
      <div className="mt-3 h-1.5 bar-track rounded">
        <div className="h-1.5 rounded" style={{ width: (done / items.length) * 100 + "%", background: allDone ? "#0F7B6F" : "#B27A00", transition: "width .3s" }} />
      </div>
      {allDone ? (
        <div className="mt-2 text-sm accent font-medium">Alles erledigt — perfekter Tag. Genau diese Konstanz bringt dich auf der DOTS-Liste nach vorn.</div>
      ) : (
        <div className="mt-2 text-xs muted">{done}/{items.length} erledigt — dranbleiben.</div>
      )}
      <style>{`.check-box{width:20px;height:20px;border:1.5px solid;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}`}</style>
    </section>
  );
}

      <div className="text-sm font-medium mb-2">{label}</div>

      <div className="h-2" />
      <SliderField label="unter Belastung" min={0} max={10} step={1} value={loadVal} onChange={onLoad} accent="#C0392B" showLabel={painLabel} />

}

function Stat({ label, value }) {
  return (
    <div className="bg-card border hairline rounded p-2 text-center">
      <div className="mono text-lg font-semibold">{value}</div>
      <div className="tiny muted uppercase">{label}</div>

}

function ExerciseCard({ ex }) {

    <div className={`bg-card border rounded p-3 ${ex.isRehab ? "hairline-accent" : "hairline"}`}>

        <div className="font-medium text-sm">{ex.isRehab && <span className="accent tiny uppercase mr-1">Reha</span>}{ex.name}</div>

        {ex.type === "reps" ? `${ex.sets} x ${ex.reps} @ RPE ${ex.rpeTarget} (${rpeLabel(ex.rpeTarget)})` : `${ex.sets} x ${ex.durationSec}s Halten`}
        {ex.deloaded && <span className="danger"> · Deload</span>}
        {ex.dupFocus && !ex.isRehab && <span className="accent"> · {ex.dupFocus}</span>}

        <div className="flex gap-1 mt-2 flex-wrap">
          {ex.perSet.map((w, i) => (

function SliderField({ label, min, max, step, value, onChange, accent = "#0F7B6F", showLabel }) {
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">

        <span className="mono" style={{ color: accent }}>{value}</span>

/* ---------- Log ---------- */

function LogTab({ session, saveSetLog, postQ, setPostQ, finishSession }) {
  if (!session) return <div className="text-sm muted">Mach zuerst dein Morgen-Check-in im Tab "Heute".</div>;

  return (
    <div className="space-y-6">
      {session.exercises.map((ex, i) => (
        <ExerciseLogger key={ex.name + i} ex={ex} onSave={(sets, note) => saveSetLog(i, sets, note)} />
      ))}

      {!session.completed && (
        <section className="border-t hairline pt-4">
          <div className="text-xs uppercase tracking-wide muted mb-2">Fragebogen nach dem Training</div>
          <SliderField label="Gesamt-RPE der Einheit" min={1} max={10} step={1} value={postQ.sessionRpe} onChange={(v) => setPostQ({ ...postQ, sessionRpe: v })} showLabel={rpeLabel} />
          <textarea placeholder="Technik — was ist aufgefallen?" value={postQ.notes.technik} onChange={(e) => setPostQ({ ...postQ, notes: { ...postQ.notes, technik: e.target.value } })} className="notearea2" rows={2} />
          <textarea placeholder="Schmerz — Verlauf während der Einheit" value={postQ.notes.schmerz} onChange={(e) => setPostQ({ ...postQ, notes: { ...postQ.notes, schmerz: e.target.value } })} className="notearea2" rows={2} />
          <textarea placeholder="Sonstiges" value={postQ.notes.sonstiges} onChange={(e) => setPostQ({ ...postQ, notes: { ...postQ.notes, sonstiges: e.target.value } })} className="notearea2" rows={2} />
          <button onClick={finishSession} className="w-full btn-primary font-semibold py-3 rounded mt-3">Einheit abschließen & speichern</button>
          <style>{`.notearea2{width:100%;background:#FFFFFF;border:1px solid #E2E8E9;border-radius:6px;padding:8px 10px;font-size:13px;color:#101619;margin-top:8px;}`}</style>
        </section>
      )}
      {session.completed && <div className="text-sm accent flex items-center gap-2"><Check size={16} /> Einheit gespeichert. Das System hat die Daten in Ermüdungs-, Volumen- und Kalorien-Logik übernommen.</div>}
    </div>
  );
}

function ExerciseLogger({ ex, onSave }) {
  const [sets, setSets] = useState(ex.loggedSets || Array.from({ length: ex.sets }, () => (ex.type === "reps" ? { weight: ex.recommendedWeight || "", reps: ex.reps, rpe: ex.rpeTarget, pain: 0 } : { durationSec: ex.durationSec, load: "", pain: 0 })));
  const [note, setNote] = useState(ex.exerciseNote || "");

  const update = (idx, field, val) => {
    const s2 = sets.map((s, i) => (i === idx ? { ...s, [field]: val } : s));
    setSets(s2);
    onSave(s2, note);
  };
  const updateNote = (v) => { setNote(v); onSave(sets, v); };

  return (
    <div className="bg-card border hairline rounded p-3">
      <div className="font-medium text-sm mb-2">{ex.isRehab && <span className="accent tiny uppercase mr-1">Reha</span>}{ex.name}</div>
      <div className="space-y-2">
        {sets.map((s, i) => (
          <div key={i} className="grid grid-cols-4 gap-2 items-center">
            <span className="text-xs muted mono">S{i + 1}</span>
            {ex.type === "reps" ? (
              <>
                <input type="number" value={s.weight} onChange={(e) => update(i, "weight", +e.target.value)} placeholder="kg" className="mini" />
                <input type="number" value={s.reps} onChange={(e) => update(i, "reps", +e.target.value)} placeholder="Wdh" className="mini" />
                <input type="number" value={s.rpe} onChange={(e) => update(i, "rpe", +e.target.value)} placeholder="RPE" className="mini" title={rpeLabel(s.rpe)} />
              </>
            ) : (
              <>
                <input type="number" value={s.durationSec} onChange={(e) => update(i, "durationSec", +e.target.value)} placeholder="Sek" className="mini" />
                <input type="text" value={s.load} onChange={(e) => update(i, "load", e.target.value)} placeholder="Last" className="mini" />
                <input type="number" value={s.pain} onChange={(e) => update(i, "pain", +e.target.value)} placeholder="Schmerz" className="mini" title={painLabel(s.pain)} />
              </>
            )}
          </div>
        ))}
      </div>
      <input type="text" value={note} onChange={(e) => updateNote(e.target.value)} placeholder="Notiz zu dieser Übung (Technik, Gefühl, Schmerzverlauf...)" className="mini mt-2" style={{ width: "100%" }} />
      <style>{`.mini{background:#F6F8F8;border:1px solid #E2E8E9;border-radius:4px;padding:6px;font-size:12px;color:#101619;width:100%;}`}</style>
    </div>
  );
}

/* ---------- Progress ---------- */

function PsychTable({ trendlog }) {
  const rows = [...(trendlog.readiness || [])].slice(-10).reverse();
  const checkins = trendlog.pain || [];
  const rl = trendlog.readiness || [];
  const scoreColor = (s) => (s == null ? "#67757B" : s < 45 ? "#C0392B" : s < 65 ? "#B27A00" : "#0F7B6F");
  return (
    <section>
      <div className="text-xs uppercase tracking-wide muted mb-2">Psychischer & körperlicher Zustand (letzte Check-ins)</div>
      {rows.length ? (
        <div className="bg-card border hairline rounded overflow-hidden">
          <table className="w-full text-xs">
            <thead>
              <tr className="muted" style={{ background: "#F0F4F4" }}>
                <th className="text-left p-2 font-medium">Datum</th>
                <th className="text-right p-2 font-medium">Readiness</th>
                <th className="text-right p-2 font-medium">Zustand</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const label = r.score < 45 ? "müde / belastet" : r.score < 65 ? "okay" : "frisch / motiviert";
                return (
                  <tr key={i} className="border-t hairline">
                    <td className="p-2 mono ink">{r.date.slice(5)}</td>
                    <td className="p-2 text-right mono font-semibold" style={{ color: scoreColor(r.score) }}>{r.score}</td>
                    <td className="p-2 text-right" style={{ color: scoreColor(r.score) }}>{label}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      ) : (
        <div className="text-xs muted">Ab dem ersten Check-in erscheint hier deine Verlaufstabelle.</div>
      )}
    </section>
  );
}

function OneRMTable({ history }) {
  return (
    <section>
      <div className="text-xs uppercase tracking-wide muted mb-2">1RM-Progression — Big Three (geschätzt aus RPE)</div>
      <div className="bg-card border hairline rounded overflow-hidden">
        <table className="w-full text-xs">
          <thead>
            <tr className="muted" style={{ background: "#F0F4F4" }}>
              <th className="text-left p-2 font-medium">Lift</th>
              <th className="text-right p-2 font-medium">Start</th>
              <th className="text-right p-2 font-medium">Aktuell</th>
              <th className="text-right p-2 font-medium">Δ</th>
            </tr>
          </thead>
          <tbody>
            {BIG_THREE.map((l) => {
              const first = firstE1RM(history, l.key);
              const cur = currentE1RM(history, l.key);
              const delta = first != null && cur != null ? cur - first : null;
              return (
                <tr key={l.key} className="border-t hairline">
                  <td className="p-2 ink font-medium">{l.label}</td>
                  <td className="p-2 text-right mono ink">{first != null ? first + " kg" : "—"}</td>
                  <td className="p-2 text-right mono ink">{cur != null ? cur + " kg" : "—"}</td>
                  <td className="p-2 text-right mono font-semibold" style={{ color: delta == null ? "#67757B" : delta >= 0 ? "#0F7B6F" : "#C0392B" }}>
                    {delta != null ? (delta >= 0 ? "+" : "") + delta.toFixed(1) + " kg" : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="tiny muted mt-1 italic">e1RM aus Gewicht × Wdh × RPE (Epley/RIR). Wird mit jeder geloggten Einheit aktualisiert.</div>
    </section>
  );
}

function GeneticBell({ history, sessionsDone }) {
  // Use squat+bench+deadlift average monthly gain as the response proxy
  const gains = BIG_THREE.map((l) => monthlyGainForLift(history, l.key, sessionsDone)).filter((g) => g != null);
  const userGain = gains.length ? gains.reduce((a, b) => a + b, 0) / gains.length : null;
  const bell = bellData(userGain);
  const cls = userGain != null ? classifyResponse(userGain) : null;

  return (
    <section>
      <div className="text-xs uppercase tracking-wide muted mb-2">Reaktions-Einordnung — wie schnell du zulegst</div>
      <div className="bg-card border hairline rounded p-3">
        <BellCurveChart pts={bell.pts} bands={RESPONSE_BANDS} userGain={userGain} />
        <div className="grid grid-cols-4 gap-1 mt-1">
          {RESPONSE_BANDS.map((b) => (
            <div key={b.label} className="text-center">
              <div className="h-1.5 rounded" style={{ background: b.color }} />
              <div className="tiny muted mt-1">{b.label}</div>
            </div>
          ))}
        </div>
        {userGain != null ? (
          <div className="text-sm mt-3" style={{ color: cls.color }}>
            Deine bisherige Rate: <span className="mono font-semibold">{userGain.toFixed(1)} kg/Monat</span> → Einordnung: <span className="font-medium">{cls.label}</span>
          </div>
        ) : (
          <div className="text-xs muted mt-3">Nach ein paar geloggten Einheiten wird hier deine Position auf der Kurve markiert.</div>
        )}
        <div className="tiny muted mt-2 italic">Wichtig: Das ist eine Einordnung deines bisherigen Fortschritts gegen grobe Populations-Richtwerte — keine DNA-/Genanalyse. Frühe Werte schwanken stark.</div>
      </div>
    </section>
  );
}

function WeightTrendSection({ trendlog }) {
  const raw = [...(trendlog.bodyweight || [])].filter((e) => e.kg > 0).sort((a, b) => a.date.localeCompare(b.date));
  const data = raw.map((e) => ({ date: e.date.slice(5), kg: e.kg }));
  const trend = computeWeightTrend(trendlog.bodyweight);
  return (
    <section>
      <div className="text-xs uppercase tracking-wide muted mb-2">Gewichtstrend</div>
      {data.length >= 2 ? (
        <div className="bg-card border hairline rounded p-3">
          <MiniLineChart series={[{ values: data.map((d) => d.kg), color: "#0F7B6F" }]} xLabels={data.map((d) => d.date)} />
          {trend && (
            <div className="text-xs muted mt-1">
              Gleitender Trend: <span className="mono" style={{ color: trend.kgPerWeek >= 0 ? "#0F7B6F" : "#C0392B" }}>{trend.kgPerWeek >= 0 ? "+" : ""}{trend.kgPerWeek.toFixed(2)} kg/Woche</span> aus {trend.points} Wiegungen (nutzt gemittelte Fenster, nicht Tagesrauschen).
            </div>
          )}
        </div>
      ) : (
        <div className="text-xs muted">Trag morgens beim Check-in dein Gewicht ein — ab 2 Einträgen erscheint hier der Verlauf.</div>
      )}
    </section>
  );
}

/* ---------- ProgressTab main ---------- */
function ProgressTab({ history, trendlog }) {
  const patterns = [
    { key: "hinge", label: "Kreuzheben-Muster (e1RM)" },
    { key: "squat", label: "Kniebeuge-Muster (e1RM)" },
    { key: "push_horizontal", label: "Bankdrück-Muster (e1RM)" },
  ];
  const vol = computeWeeklyVolume(history);
  const painData = (trendlog.pain || []).map((p) => ({ date: p.date.slice(5), Schulter: p.sL, Knie: p.kL, Nacken: p.nL }));
  const sessionsDone = (trendlog.sessions || []).length;

  return (
    <div className="space-y-8">
      <PsychTable trendlog={trendlog} />
      <OneRMTable history={history} />
      <GeneticBell history={history} sessionsDone={sessionsDone} />

      <section>
        <div className="text-xs uppercase tracking-wide muted mb-3">Wochenvolumen pro Muskelgruppe (Sätze, letzte 7 Tage)</div>
        <div className="space-y-3">
          {Object.entries(MUSCLE_LANDMARKS).map(([m, land]) => {
            const sets = vol[m] || 0;
            const st = volumeStatus(sets, land);
            const pct = Math.min(100, (sets / land.mrv) * 100);
            return (
              <div key={m}>
                <div className="flex justify-between text-xs mb-1">
                  <span>{MUSCLE_DE[m]}</span>
                  <span className="mono" style={{ color: st.color }}>{sets} — {st.label}</span>
                </div>
                <div className="h-1.5 bar-track rounded">
                  <div className="h-1.5 rounded" style={{ width: pct + "%", background: st.color }} />
                </div>
                <div className="tiny muted mt-0.5 mono">MEV {land.mev} · MAV {land.mav} · MRV {land.mrv}</div>
              </div>
            );
          })}
        </div>
      </section>

      <section>
        <div className="text-xs uppercase tracking-wide muted mb-2">Schmerzverlauf unter Belastung (NRS 0–10)</div>
        {painData.length >= 2 ? (
          <>
            <MiniLineChart
              series={[
                { name: "Schulter", color: "#C0392B", values: painData.map((d) => d.Schulter) },
                { name: "Knie", color: "#B27A00", values: painData.map((d) => d.Knie) },
                { name: "Nacken", color: "#67757B", values: painData.map((d) => d.Nacken) },
              ]}
              xLabels={painData.map((d) => d.date)}
              yDomain={[0, 10]}
            />
            <ChartLegend series={[{ name: "Schulter", color: "#C0392B" }, { name: "Knie", color: "#B27A00" }, { name: "Nacken", color: "#67757B" }]} />
          </>
        ) : (
          <div className="text-xs muted">Ab 2 Check-ins entsteht hier dein Schmerz-Trend.</div>
        )}
      </section>

      <WeightTrendSection trendlog={trendlog} />

      {patterns.map((p) => {
        const data = (history[p.key] || []).filter((h) => h.type === "reps").map((h) => ({ date: h.date.slice(5), e1rm: h.e1rm }));
        return (
          <section key={p.key}>
            <div className="text-xs uppercase tracking-wide muted mb-2">{p.label}</div>
            {data.length ? (
              <MiniLineChart series={[{ values: data.map((d) => d.e1rm), color: "#0F7B6F" }]} xLabels={data.map((d) => d.date)} />
            ) : (
              <div className="text-xs muted">Noch keine Daten geloggt.</div>
            )}
          </section>
        );
      })}
    </div>
  );
}

/* ---------- Profile ---------- */

function ProfileTab({ profile, onSave, tdeeCorrection }) {
  const [f, setF] = useState({ targetRateId: "moderate", manualCalories: null, ...profile });
  const [whatIfKcal, setWhatIfKcal] = useState("");
  const [savedTick, setSavedTick] = useState(false);

  // Resync local form whenever the stored profile changes (e.g. after returning to this tab)
  useEffect(() => {
    setF({ targetRateId: "moderate", manualCalories: null, ...profile });
  }, [profile]);

  const preview = calcNutrition(f, tdeeCorrection);
  const wi = whatIfKcal ? { weekly: ((+whatIfKcal - preview.tdee) * 7) / 7700 } : null;

  // Auto-save with debounce so nothing is lost on tab switch
  const commit = (next) => {
    setF(next);
    onSave(next, true); // silent persist
    setSavedTick(true);
    clearTimeout(window.__profSaveTO);
    window.__profSaveTO = setTimeout(() => setSavedTick(false), 1200);
  };

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <div className="text-xs uppercase tracking-wide muted">Profil</div>
        {savedTick && <span className="tiny accent">✓ automatisch gespeichert</span>}
      </div>
      <section className="space-y-4">
        <Field label="Größe (cm)"><input type="number" value={f.heightCm} onChange={(e) => commit({ ...f, heightCm: +e.target.value })} className="w-full bg-card border hairline rounded px-3 py-2 text-sm" /></Field>
        <Field label="Körpergewicht (kg)"><input type="number" value={f.weightKg} onChange={(e) => commit({ ...f, weightKg: +e.target.value })} className="w-full bg-card border hairline rounded px-3 py-2 text-sm" /></Field>
        <Field label="Körperfett (%)"><input type="number" value={f.bf} onChange={(e) => commit({ ...f, bf: +e.target.value })} className="w-full bg-card border hairline rounded px-3 py-2 text-sm" /></Field>
      </section>

      <section className="border-t hairline pt-4">
        <div className="text-xs uppercase tracking-wide muted mb-3">Regler: gewünschte Zunahmerate</div>
        <div className="space-y-2">
          {RATE_OPTIONS.map((r) => (
            <label key={r.id} className={`flex items-center justify-between p-3 rounded border cursor-pointer ${f.targetRateId === r.id ? "hairline-teal bg-card" : "hairline"}`}>
              <div>
                <div className="text-sm font-medium">{r.label} — {r.pct}%/Woche</div>
                <div className="text-xs muted">{r.desc}</div>
              </div>
              <input type="radio" checked={f.targetRateId === r.id} onChange={() => commit({ ...f, targetRateId: r.id, manualCalories: null })} />
            </label>
          ))}
        </div>
        <div className="text-xs muted mt-2">
          → berechnet: {preview.calculatedCalories} kcal/Tag (TDEE {preview.tdee} inkl. lernender Korrektur {tdeeCorrection >= 0 ? "+" : ""}{tdeeCorrection} kcal)
        </div>
      </section>

      <section className="border-t hairline pt-4">
        <div className="text-xs uppercase tracking-wide muted mb-2">Eigene Kalorienvorgabe (überschreibt den Regler)</div>
        <input type="number" placeholder="z.B. 3200" value={f.manualCalories || ""} onChange={(e) => commit({ ...f, manualCalories: e.target.value ? +e.target.value : null })} className="w-full bg-card border hairline rounded px-3 py-2 text-sm" />
        {f.manualCalories && (
          <div className="text-xs accent mt-2">
            Bei {f.manualCalories} kcal/Tag: prognostizierte Zunahme ≈ {(((f.manualCalories - preview.tdee) * 7) / 7700).toFixed(2)} kg/Woche
          </div>
        )}
      </section>

      <section className="border-t hairline pt-4">
        <div className="text-xs uppercase tracking-wide muted mb-2">Was-wäre-wenn-Rechner</div>
        <input type="number" placeholder="Hypothetische kcal/Tag eingeben" value={whatIfKcal} onChange={(e) => setWhatIfKcal(e.target.value)} className="w-full bg-card border hairline rounded px-3 py-2 text-sm" />
        {wi && (
          <div className="text-xs muted mt-2">
            → ≈ <span className="accent mono">{wi.weekly.toFixed(2)} kg/Woche</span> · ≈ {(wi.weekly * 4.345).toFixed(1)} kg/Monat (grobe Schätzung; bei hohem Überschuss ist ein Teil davon Fettmasse)
          </div>
        )}
      </section>

      <section className="border-t hairline pt-4">
        <div className="text-xs uppercase tracking-wide muted mb-2">Datensicherung</div>
        <div className="flex gap-2">
          <button onClick={async () => {
            const dump = await exportAllData();
            const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "ironledger-backup-" + todayStr() + ".json";
            document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
          }} className="flex-1 btn-primary font-semibold py-2 rounded text-sm">Backup exportieren</button>
          <label className="flex-1 bg-card border hairline-teal accent font-semibold py-2 rounded text-sm text-center cursor-pointer">
            Backup laden
            <input type="file" accept="application/json" style={{ display: "none" }} onChange={async (e) => {
              const file = e.target.files[0]; if (!file) return;
              try { const txt = await file.text(); const obj = JSON.parse(txt); const n = await importAllData(obj); alert("Backup geladen (" + n + " Einträge). App wird neu geladen."); location.reload(); }
              catch (err) { alert("Fehler beim Laden: " + err.message); }
            }} />
          </label>
        </div>
        <div className="tiny muted mt-2">Sichere regelmäßig ein Backup — es enthält alle deine Trainings-, Check-in- und Verlaufsdaten als Datei.</div>
      </section>

      <div className="text-xs accent bg-card border hairline-accent rounded p-3">Alle Änderungen werden automatisch gespeichert — kein Extra-Klick nötig.</div>

      <div className="text-xs muted pt-4 border-t hairline leading-relaxed">
        Alter: {calcAge(f.dob)} Jahre. Dieses Tool steuert Training und Ernährung regelbasiert und lernt aus deinen Daten (Gewichtstrend, Readiness, e1RM, Session-RPE). Jede Entscheidung ist im „Warum"-Panel nachvollziehbar. Es ersetzt keine ärztliche oder physiotherapeutische Diagnostik — bei anhaltenden Ruheschmerzen bitte fachlich abklären lassen.
      </div>
    </div>
  );
}


// ---- Mount ----
try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(IronLedger));
} catch (e) {
  document.getElementById("root").innerHTML = '<div style="font-family:monospace;white-space:pre-wrap;padding:20px;color:#C0392B;background:#fff;">MOUNT-FEHLER:\n' + (e && e.message ? e.message : e) + '\n\n' + (e && e.stack ? e.stack : '') + '</div>';
  console.error(e);
}
